slug: deploy
name: Deploy this agent
description: >-
  Deploy (create-or-update + publish) the agent INTO THE ACTIVE SESSION ORG, then
  read it back to confirm where it landed. Run this from the workspace PLAYGROUND
  after switching the studio to the target organization: the agent is created in
  your active org (session.org.slug) and you become its owner. There is no org
  argument — the org follows your session, so changing target = switch org, re-run.
when:
  endpoint: true
arguments:
  name:
    type: string
  instructions:
    type: string
  model:
    type: string
  temperature:
    type: number
  profile:
    type: string
  tools:
    type: array
  agentId:
    type: string
  visibility:
    type: string
do:
  - comment: >-
      Declarative deploy AS THE TRIGGERING USER (via _afCall asUser:true). The skill
      passes the FULL desired state; the agent-factory webhook reads org from
      session.org.slug and owner from user.id, so the deploy lands in whatever org is
      active in the playground. Empty agentId → create, otherwise → update.
  - set:
      name: payload
      value:
        name: '{{name}}'
        instructions: '{{instructions}}'
        model: '{{model}}'
        temperature: '{{temperature}}'
        profile: '{{profile}}'
  - comment: >-
      Always send `tools` (default []) so deploy is truly declarative: an empty
      manifest clears remote tools. PATCH/POST only act on tools when the key is
      present in the body, and an empty array is falsy — hence the explicit default.
  - conditions:
      '{{tools}}':
        - set:
            name: payload
            type: merge
            value:
              tools: '{{tools}}'
      default:
        - set:
            name: payload
            type: merge
            value:
              tools: []
  - conditions:
      '{{agentId}}':
        - _afCall:
            asUser: true
            endpoint: v1/agents/{{agentId}}
            method: PATCH
            body: '{{payload}}'
            output: agent
      default:
        - _afCall:
            asUser: true
            endpoint: v1/agents
            method: POST
            body: '{{payload}}'
            output: agent
  - conditions:
      '{% !{{agent.error}} and {{agent.id}} %}':
        - _afCall:
            asUser: true
            endpoint: v1/agents/{{agent.id}}/publish
            method: POST
            body:
              visibility: '{{visibility}}'
            output: published
        - comment: >-
            Read the agent back (as the user) to confirm the org it landed in and the
            resolved owner — this replaces a separate whoAmI / org-selection step.
        - _afCall:
            asUser: true
            endpoint: v1/agents/{{agent.id}}
            method: GET
            output: created
output:
  id: '{{agent.id}}'
  name: '{{agent.name}}'
  status: '{{published.status}}'
  org: '{{created.orgSlug}}'
  owner: '{{created.owner_id}}'
  error: '{{agent.error}}'
  errorMessage: '{{agent.message}}'
