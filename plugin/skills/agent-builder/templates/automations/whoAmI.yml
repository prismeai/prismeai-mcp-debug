slug: whoAmI
name: utils/Resolve org (legacy)
description: Resolve the org the configured agent-factory key deploys into (getAgent.orgSlug).
when:
  endpoint: true
arguments:
  agentId:
    type: string
do:
  - _afCall:
      endpoint: v1/agents/{{agentId}}
      method: GET
      output: agent
output:
  orgSlug: '{{agent.orgSlug}}'
  error: '{{agent.error}}'
  agentName: '{{agent.name}}'
