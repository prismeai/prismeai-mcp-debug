slug: updateQueryJob
name: updateQueryJob
description: Update query job state (Aborted only) (PATCH /jobs/query/{jobId}). Calls the Salesforce REST API via the resolved per-user OAuth session (or JWT Bearer fallback). Public App-mode automation — tenants call `Salesforce.updateQueryJob:` directly from their own automations.
arguments:
  jobId:
    type: string
    description: Path param `jobId` (required).
  state:
    type: object
    additionalProperties: true
    description: Body field `state`.
do:
  - buildAppAuth:
      output: auth
  - conditions:
      '{{auth.error}}':
        - set:
            name: result
            value:
              error: '{{auth.error}}'
        - break: {}
  - set:
      name: methodArgs
      value:
        jobId: '{{jobId}}'
        state: '{{state}}'
  - methodRestOp:
      operationName: updateQueryJob
      args: '{{methodArgs}}'
      accessToken: '{{auth.accessToken}}'
      baseUrl: '{{auth.baseUrl}}'
      output: apiResult
  - conditions:
      '!{{apiResult.success}}':
        - set:
            name: result
            value:
              error: '{{apiResult.error}}'
        - break: {}
  - set:
      name: result
      value: '{{apiResult.data}}'
output: '{{result}}'
