slug: validateAgent
name: /Helpers/validateAgent
description: >-
  Authorize an incoming MCP agent. The agentId is injected server-side by
  agent-factory via the MCP capability `scope: "...,agent_id"` (so it reflects
  the real calling agent). Authorization = (a) global/central endpoint
  short-circuit (config.centralAuth resolves -> all agents accepted), else (b)
  the agentId must be in the tenant allowlist (config.authorizedAgents,
  comma-separated, backed by a workspace secret). Returns { valid, reason }.
private: true
arguments:
  agentId:
    type: string
    description: Agent id (scope-injected by agent-factory, or header).
do:
  - comment: >-
      Global/central endpoint: config.centralAuth resolves ONLY in the CORE
      workspace context (its own secret store) — tenant app-instances inherit
      just the unresolved literal, so central.oauthClientId is empty there (see
      resolveOAuthClient). When the central client IS configured, this MCP is the
      shared global endpoint where the per-agent allowlist does not apply: every
      agent is accepted (per-user OAuth is the real gate). Only ship this branch
      on central-OAuth connectors that expose a global endpoint.
  - set:
      name: central
      value: '{{config.centralAuth}}'
  - conditions:
      '{{central.oauthClientId}}':
        - set:
            name: output
            value:
              valid: true
              reason: global_endpoint
        - break: {}
  - comment: >-
      Allow-all sentinel: config.authorizedAgents = "*" disables the per-agent
      gate entirely (any caller authorized, agentId not even required). Set from
      the config app "Autoriser tous les agents" toggle.
  - Custom Code.run:
      function: isAgentAllowed
      parameters:
        list: '{{config.authorizedAgents}}'
        agentId: '{{agentId}}'
      output: allow
  - conditions:
      '{{allow.wildcard}}':
        - set:
            name: output
            value:
              valid: true
              reason: all_agents
        - break: {}
  - conditions:
      '!{{agentId}}':
        - set:
            name: output
            value:
              valid: false
              reason: missing_agent_id
        - break: {}
  - conditions:
      '!{{allow.allowed}}':
        - set:
            name: output
            value:
              valid: false
              reason: not_allowlisted
      default:
        - set:
            name: output
            value:
              valid: true
              agentId: '{{agentId}}'
output: '{{output}}'
