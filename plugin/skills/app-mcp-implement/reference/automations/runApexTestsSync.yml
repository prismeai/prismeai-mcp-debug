slug: runApexTestsSync
name: runApexTestsSync
description: Run Apex tests synchronously (small scope only) (POST /tooling/runTestsSynchronous). Calls the Salesforce REST API via the resolved per-user OAuth session (or JWT Bearer fallback). Public App-mode automation — tenants call `Salesforce.runApexTestsSync:` directly from their own automations.
arguments:
  tests:
    type: object
    additionalProperties: true
    description: Body field `tests`.
do:
  - buildAppAuth:
      output: auth
  - conditions:
      '{{auth.error}}':
        - set:
            name: result
            value:
              error: '{{auth.error}}'
        - break: {}
  - set:
      name: methodArgs
      value:
        tests: '{{tests}}'
  - methodRestOp:
      operationName: runApexTestsSync
      args: '{{methodArgs}}'
      accessToken: '{{auth.accessToken}}'
      baseUrl: '{{auth.baseUrl}}'
      output: apiResult
  - conditions:
      '!{{apiResult.success}}':
        - set:
            name: result
            value:
              error: '{{apiResult.error}}'
        - break: {}
  - set:
      name: result
      value: '{{apiResult.data}}'
output: '{{result}}'
