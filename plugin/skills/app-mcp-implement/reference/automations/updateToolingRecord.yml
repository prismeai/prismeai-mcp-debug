slug: updateToolingRecord
name: updateToolingRecord
description: Update a Tooling API record (PATCH /tooling/sobjects/{sObjectName}/{recordId}). Calls the Salesforce REST API via the resolved per-user OAuth session (or JWT Bearer fallback). Public App-mode automation — tenants call `Salesforce.updateToolingRecord:` directly from their own automations.
arguments:
  sObjectName:
    type: string
    description: Path param `sObjectName` (required).
  recordId:
    type: string
    description: Path param `recordId` (required).
  body:
    type: object
    additionalProperties: true
    description: JSON request body.
do:
  - buildAppAuth:
      output: auth
  - conditions:
      '{{auth.error}}':
        - set:
            name: result
            value:
              error: '{{auth.error}}'
        - break: {}
  - set:
      name: methodArgs
      value:
        sObjectName: '{{sObjectName}}'
        recordId: '{{recordId}}'
        body: '{{body}}'
  - methodRestOp:
      operationName: updateToolingRecord
      args: '{{methodArgs}}'
      accessToken: '{{auth.accessToken}}'
      baseUrl: '{{auth.baseUrl}}'
      output: apiResult
  - conditions:
      '!{{apiResult.success}}':
        - set:
            name: result
            value:
              error: '{{apiResult.error}}'
        - break: {}
  - set:
      name: result
      value: '{{apiResult.data}}'
output: '{{result}}'
