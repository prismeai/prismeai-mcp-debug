slug: listQueryJobs
name: listQueryJobs
description: List bulk query jobs (GET /jobs/query). Calls the Salesforce REST API via the resolved per-user OAuth session (or JWT Bearer fallback). Public App-mode automation — tenants call `Salesforce.listQueryJobs:` directly from their own automations.
arguments:
  isPkChunkingEnabled:
    type: boolean
    description: Query param `isPkChunkingEnabled`.
  jobType:
    type: string
    description: Query param `jobType`.
    enum:
      - Classic
      - V2Query
  concurrencyMode:
    type: string
    description: Query param `concurrencyMode`.
    enum:
      - Parallel
      - Serial
do:
  - buildAppAuth:
      output: auth
  - conditions:
      '{{auth.error}}':
        - set:
            name: result
            value:
              error: '{{auth.error}}'
        - break: {}
  - set:
      name: methodArgs
      value:
        isPkChunkingEnabled: '{{isPkChunkingEnabled}}'
        jobType: '{{jobType}}'
        concurrencyMode: '{{concurrencyMode}}'
  - methodRestOp:
      operationName: listQueryJobs
      args: '{{methodArgs}}'
      accessToken: '{{auth.accessToken}}'
      baseUrl: '{{auth.baseUrl}}'
      output: apiResult
  - conditions:
      '!{{apiResult.success}}':
        - set:
            name: result
            value:
              error: '{{apiResult.error}}'
        - break: {}
  - set:
      name: result
      value: '{{apiResult.data}}'
output: '{{result}}'
