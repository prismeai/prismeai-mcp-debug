slug: onInstall
name: MCP/onInstall
description: >-
  Provision the tenant app-instance on install/configure (tenant-context model,
  NO HMAC key). Sets the MCP endpoint (this instance's own webhook) + the config
  app link, provisions two tenant secrets — `salesforceAuth` (object: auth
  mode + credentials) and `salesforceAuthorizedAgents` (agent allowlist) —
  and writes the two-hop bindings so `config.auth` / `config.authorizedAgents`
  resolve. Exposed URLs use `slug:<slug>` by default (re-import / rename stable);
  the raw id is used only for `/config` + `/security/secrets` (don't resolve slug)
  and — for Microsoft Entra connectors only — the OAuth callback. Idempotent.
private: true
when:
  events:
    - workspaces.apps.installed
    - workspaces.apps.configured
do:
  - conditions:
      '!{{run.appInstanceSlug}}':
        - emit:
            event: salesforce.onInstall.skipped
            payload:
              reason: no-app-instance-slug
        - break: {}
  - auth:
      workspace: true
      output: wsJwt
  - comment: >-
      Resolve BOTH the raw id and the slug of the tenant workspace via one GET
      (works whether global.workspaceId is the raw id or the slug:<slug> form).
      Exposed endpoints use slug:<slug> by DEFAULT — the slug survives a re-import
      (the workspace id changes on every re-import while you debug an install, the
      slug stays stable), so a slug-form callback stays valid across attempts. Two
      exceptions are FORCED to the raw id: (1) the OAuth callback ONLY for Microsoft
      Entra, which rejects the ':' of slug:<slug> in a redirect URI (Google /
      Salesforce tolerate it → keep slug); (2) /config + /security/secrets, which
      don't resolve slug:<slug> (404). configAppUrl passes BOTH forms so the SPA has
      the raw id (for /security/secrets) and the slug (for its slug-form URLs).
  - fetch:
      url: '{{global.apiUrl}}/workspaces/{{global.workspaceId}}'
      method: GET
      headers:
        Authorization: Bearer {{wsJwt.jwt}}
      outputMode: body
      emitErrors: false
      output: wsInfo
  - set:
      name: slugRef
      value: '{{wsInfo.id}}'
  - conditions:
      '{{wsInfo.slug}}':
        - set:
            name: slugRef
            value: 'slug:{{wsInfo.slug}}'
  - set:
      name: configAppUrl
      value: '{{global.studioUrl}}/apps/salesforce?workspaceId={{wsInfo.id}}&workspaceSlug={{wsInfo.slug}}&appInstance={{run.appInstanceSlug}}'
  - comment: >-
      oauthCallbackUrl: slug:<slug> by default (re-import / rename stable). For a
      MICROSOFT ENTRA connector, swap slugRef for {{wsInfo.id}} on this line only —
      Entra rejects the ':' in the redirect URI. See the powerbi connector.
  - set:
      name: oauthCallbackUrl
      value: '{{global.apiUrl}}/workspaces/{{slugRef}}/webhooks/{{run.appInstanceSlug}}.oauthCallback'
  - set:
      name: secretsUrl
      value: '{{global.apiUrl}}/workspaces/{{wsInfo.id}}/security/secrets'
  - fetch:
      url: '{{secretsUrl}}'
      method: GET
      headers:
        Authorization: Bearer {{wsJwt.jwt}}
      output: existingSecretsResp
      outputMode: detailed_response
      emitErrors: false
  - set:
      name: existingSecrets
      value: '{{existingSecretsResp.body}}'
  - set:
      name: toProvision
      value: {}
  - set:
      name: provisionCount
      value: 0
  - conditions:
      '!{{existingSecrets.salesforceAuth}}':
        - set:
            name: toProvision.salesforceAuth
            value:
              value: {}
              description: 'Salesforce auth config (managed by the connector config app): { mode, loginHost, jwtUsername, oauthClientId, oauthClientSecret, jwtPrivateKey, accessToken, instanceUrl }.'
        - set:
            name: provisionCount
            value: '{% {{provisionCount}} + 1 %}'
  - conditions:
      '!{{existingSecrets.salesforceAuthorizedAgents}}':
        - set:
            name: toProvision.salesforceAuthorizedAgents
            value:
              value: ''
              description: 'Comma-separated agentIds authorized to call this connector''s MCP endpoint. Managed by the config app.'
        - set:
            name: provisionCount
            value: '{% {{provisionCount}} + 1 %}'
  - conditions:
      '{{provisionCount}} > 0':
        - fetch:
            url: '{{secretsUrl}}'
            method: PATCH
            headers:
              Authorization: Bearer {{wsJwt.jwt}}
              Content-Type: application/json
            body: '{{toProvision}}'
            output: provisionResp
            outputMode: detailed_response
            emitErrors: false
        - emit:
            event: salesforce.onInstall.secretsProvisioned
            payload:
              status: '{{provisionResp.status}}'
              count: '{{provisionCount}}'
  - comment: >-
      Binding B — tenant workspace config.value maps each config key onto its
      secret (a secret reference only resolves inside config.value). Literals
      built via Custom Code. PATCH /config replaces `value`, so GET first + merge.
  - Custom Code.run:
      function: makeSecretRef
      parameters:
        key: salesforceAuth
      output: secretRefAuth
  - Custom Code.run:
      function: makeSecretRef
      parameters:
        key: salesforceAuthorizedAgents
      output: secretRefAllowlist
  - set:
      name: configUrl
      value: '{{global.apiUrl}}/workspaces/{{wsInfo.id}}/config'
  - fetch:
      url: '{{configUrl}}'
      method: GET
      headers:
        Authorization: Bearer {{wsJwt.jwt}}
      output: curWsConfig
      outputMode: body
      emitErrors: false
  - set:
      name: newWsValue
      value: '{{curWsConfig.value}}'
  - set:
      name: newWsValue.salesforceAuth
      value: '{{secretRefAuth}}'
  - set:
      name: newWsValue.salesforceAuthorizedAgents
      value: '{{secretRefAllowlist}}'
  - fetch:
      url: '{{configUrl}}'
      method: PATCH
      headers:
        Authorization: Bearer {{wsJwt.jwt}}
        Content-Type: application/json
      body:
        value: '{{newWsValue}}'
      output: wsConfigResp
      outputMode: detailed_response
      emitErrors: false
  - emit:
      event: salesforce.onInstall.completed
      payload:
        configAppUrl: '{{configAppUrl}}'
        secretsProvisioned: '{{provisionCount}}'
  - comment: >-
      Binding A (terminal merge) — instance config keys point at the tenant
      workspace config.value (binding B). `set: config` merge is terminal — keep last.
  - Custom Code.run:
      function: makeConfigRef
      parameters:
        key: salesforceAuth
      output: bindingAuth
  - Custom Code.run:
      function: makeConfigRef
      parameters:
        key: salesforceAuthorizedAgents
      output: bindingAllowlist
  - set:
      name: config
      type: merge
      value:
        configAppUrl: '{{configAppUrl}}'
        oauthCallbackUrl: '{{oauthCallbackUrl}}'
        auth: '{{bindingAuth}}'
        authorizedAgents: '{{bindingAllowlist}}'
output: '{{configAppUrl}}'
