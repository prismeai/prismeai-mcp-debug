slug: createIngestJob
name: createIngestJob
description: Create a new bulk ingest job (operation + sObject + lineEnding + columnDelimiter) (POST /jobs/ingest). Calls the Salesforce REST API via the resolved per-user OAuth session (or JWT Bearer fallback). Public App-mode automation — tenants call `Salesforce.createIngestJob:` directly from their own automations.
arguments:
  object:
    type: object
    additionalProperties: true
    description: Body field `object`.
  operation:
    type: object
    additionalProperties: true
    description: Body field `operation`.
  externalIdFieldName:
    type: object
    additionalProperties: true
    description: Body field `externalIdFieldName`.
  contentType:
    type: object
    additionalProperties: true
    description: Body field `contentType`.
  lineEnding:
    type: object
    additionalProperties: true
    description: Body field `lineEnding`.
  columnDelimiter:
    type: object
    additionalProperties: true
    description: Body field `columnDelimiter`.
  assignmentRuleId:
    type: object
    additionalProperties: true
    description: Body field `assignmentRuleId`.
do:
  - buildAppAuth:
      output: auth
  - conditions:
      '{{auth.error}}':
        - set:
            name: result
            value:
              error: '{{auth.error}}'
        - break: {}
  - set:
      name: methodArgs
      value:
        object: '{{object}}'
        operation: '{{operation}}'
        externalIdFieldName: '{{externalIdFieldName}}'
        contentType: '{{contentType}}'
        lineEnding: '{{lineEnding}}'
        columnDelimiter: '{{columnDelimiter}}'
        assignmentRuleId: '{{assignmentRuleId}}'
  - methodRestOp:
      operationName: createIngestJob
      args: '{{methodArgs}}'
      accessToken: '{{auth.accessToken}}'
      baseUrl: '{{auth.baseUrl}}'
      output: apiResult
  - conditions:
      '!{{apiResult.success}}':
        - set:
            name: result
            value:
              error: '{{apiResult.error}}'
        - break: {}
  - set:
      name: result
      value: '{{apiResult.data}}'
output: '{{result}}'
