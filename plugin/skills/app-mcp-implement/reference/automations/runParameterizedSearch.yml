slug: runParameterizedSearch
name: runParameterizedSearch
description: Structured parameterized search (richer than SOSL string) (POST /parameterizedSearch). Calls the Salesforce REST API via the resolved per-user OAuth session (or JWT Bearer fallback). Public App-mode automation — tenants call `Salesforce.runParameterizedSearch:` directly from their own automations.
arguments:
  body:
    type: object
    additionalProperties: true
    description: JSON request body.
do:
  - buildAppAuth:
      output: auth
  - conditions:
      '{{auth.error}}':
        - set:
            name: result
            value:
              error: '{{auth.error}}'
        - break: {}
  - set:
      name: methodArgs
      value:
        body: '{{body}}'
  - methodRestOp:
      operationName: runParameterizedSearch
      args: '{{methodArgs}}'
      accessToken: '{{auth.accessToken}}'
      baseUrl: '{{auth.baseUrl}}'
      output: apiResult
  - conditions:
      '!{{apiResult.success}}':
        - set:
            name: result
            value:
              error: '{{apiResult.error}}'
        - break: {}
  - set:
      name: result
      value: '{{apiResult.data}}'
output: '{{result}}'
