slug: getIngestUnprocessed
name: getIngestUnprocessed
description: Download CSV of rows not processed (job aborted before completion) (GET /jobs/ingest/{jobId}/unprocessedRecords). Calls the Salesforce REST API via the resolved per-user OAuth session (or JWT Bearer fallback). Public App-mode automation — tenants call `Salesforce.getIngestUnprocessed:` directly from their own automations.
arguments:
  jobId:
    type: string
    description: Path param `jobId` (required).
do:
  - buildAppAuth:
      output: auth
  - conditions:
      '{{auth.error}}':
        - set:
            name: result
            value:
              error: '{{auth.error}}'
        - break: {}
  - set:
      name: methodArgs
      value:
        jobId: '{{jobId}}'
  - methodRestOp:
      operationName: getIngestUnprocessed
      args: '{{methodArgs}}'
      accessToken: '{{auth.accessToken}}'
      baseUrl: '{{auth.baseUrl}}'
      output: apiResult
  - conditions:
      '!{{apiResult.success}}':
        - set:
            name: result
            value:
              error: '{{apiResult.error}}'
        - break: {}
  - set:
      name: result
      value: '{{apiResult.data}}'
output: '{{result}}'
