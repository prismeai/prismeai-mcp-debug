slug: runCompositeGraph
name: runCompositeGraph
description: Execute multiple composite graphs in a single transaction (POST /composite/graph). Calls the Salesforce REST API via the resolved per-user OAuth session (or JWT Bearer fallback). Public App-mode automation — tenants call `Salesforce.runCompositeGraph:` directly from their own automations.
arguments:
  graphs:
    type: object
    additionalProperties: true
    description: Body field `graphs`.
do:
  - buildAppAuth:
      output: auth
  - conditions:
      '{{auth.error}}':
        - set:
            name: result
            value:
              error: '{{auth.error}}'
        - break: {}
  - set:
      name: methodArgs
      value:
        graphs: '{{graphs}}'
  - methodRestOp:
      operationName: runCompositeGraph
      args: '{{methodArgs}}'
      accessToken: '{{auth.accessToken}}'
      baseUrl: '{{auth.baseUrl}}'
      output: apiResult
  - conditions:
      '!{{apiResult.success}}':
        - set:
            name: result
            value:
              error: '{{apiResult.error}}'
        - break: {}
  - set:
      name: result
      value: '{{apiResult.data}}'
output: '{{result}}'
