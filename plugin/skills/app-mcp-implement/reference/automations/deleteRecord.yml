slug: deleteRecord
name: deleteRecord
description: Delete a record by ID (DELETE /sobjects/{sObjectName}/{recordId}). Calls the Salesforce REST API via the resolved per-user OAuth session (or JWT Bearer fallback). Public App-mode automation — tenants call `Salesforce.deleteRecord:` directly from their own automations.
arguments:
  sObjectName:
    type: string
    description: Path param `sObjectName` (required).
  recordId:
    type: string
    description: Path param `recordId` (required).
do:
  - buildAppAuth:
      output: auth
  - conditions:
      '{{auth.error}}':
        - set:
            name: result
            value:
              error: '{{auth.error}}'
        - break: {}
  - set:
      name: methodArgs
      value:
        sObjectName: '{{sObjectName}}'
        recordId: '{{recordId}}'
  - methodRestOp:
      operationName: deleteRecord
      args: '{{methodArgs}}'
      accessToken: '{{auth.accessToken}}'
      baseUrl: '{{auth.baseUrl}}'
      output: apiResult
  - conditions:
      '!{{apiResult.success}}':
        - set:
            name: result
            value:
              error: '{{apiResult.error}}'
        - break: {}
  - set:
      name: result
      value: '{{apiResult.data}}'
output: '{{result}}'
