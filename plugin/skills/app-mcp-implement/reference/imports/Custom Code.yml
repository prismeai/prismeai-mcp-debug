appSlug: Custom Code
slug: Custom Code
config:
  functions:
    isAgentAllowed:
      parameters:
        list:
          type: string
        agentId:
          type: string
      code: |
        const v = (list === null || list === undefined) ? '' : String(list);
        if (v.indexOf('{' + '{') !== -1) return { allowed: false, wildcard: false };
        const ids = v.split(',').map(function (s) { return s.trim(); }).filter(Boolean);
        // "*" = allow ALL agents (disables the per-agent gate).
        const wildcard = ids.indexOf('*') !== -1;
        return { allowed: wildcard || ids.indexOf(String(agentId)) !== -1, wildcard: wildcard };
    makeConfigRef:
      parameters:
        key:
          type: string
      code: |
        // Build the literal binding string "{{config.<key>}}" in plain JS so
        // DSUL never parses it as a token. Used by onInstall to write binding A
        // into the app instance config (single-pass substitution stores the
        // literal, which resolves later against the tenant workspace config).
        return '{' + '{config.' + key + '}' + '}';

    makeSecretRef:
      parameters:
        key:
          type: string
      code: |
        // Build the literal binding string "{{secret.<key>}}" in plain JS.
        // Used by onInstall to write binding B into the tenant workspace
        // config.value (the only place {{secret.x}} resolves).
        return '{' + '{secret.' + key + '}' + '}';

    makeTokenSecretName:
      parameters:
        userId:
          type: string
      code: |
        // Workspace-secret name holding a user's Salesforce OAuth refresh token,
        // used for non-interactive (cron / autonomous) resolution. Reject empty
        // or unresolved-binding ids so distinct users can never collapse onto the
        // same secret name (defense-in-depth).
        var u = (userId === null || userId === undefined) ? '' : String(userId).trim();
        if (!u || u.indexOf('{' + '{') >= 0) { return { error: 'invalid_user' }; }
        return { name: 'sfnRefresh_' + u };

    normalizeLoginHost:
      parameters:
        rawHost:
          type: string
      code: |
        // Single source of truth for the Salesforce host rule (used by every
        // OAuth/token flow). Salesforce OAuth/API endpoints live ONLY on
        // *.my.salesforce.com (or login/test.salesforce.com) — NEVER on the
        // Lightning UI host. Apply the default fallback + rewrite the Lightning
        // host (replace-all) so a pasted lightning.force.com URL still works.
        var h = (rawHost === null || rawHost === undefined || String(rawHost).trim() === '')
          ? 'https://login.salesforce.com'
          : String(rawHost).trim();
        return { host: h.split('.lightning.force.com').join('.my.salesforce.com') };

    buildQueryString:
      parameters:
        params:
          type: object
      code: |
        const p = params || {};
        const parts = [];
        for (const [k, v] of Object.entries(p)) {
          if (v === null || v === undefined || v === '') continue;
          if (Array.isArray(v)) {
            for (const item of v) parts.push(encodeURIComponent(k) + '=' + encodeURIComponent(String(item)));
          } else if (typeof v === 'object') {
            parts.push(encodeURIComponent(k) + '=' + encodeURIComponent(JSON.stringify(v)));
          } else {
            parts.push(encodeURIComponent(k) + '=' + encodeURIComponent(String(v)));
          }
        }
        return parts.length ? '?' + parts.join('&') : '';
    generatePkce:
      parameters: {}
      code: |
        const crypto = require('crypto');
        const codeVerifier = crypto.randomBytes(32).toString('base64url');
        const codeChallenge = crypto.createHash('sha256').update(codeVerifier).digest('base64url');
        return { codeVerifier, codeChallenge };
    generateState:
      parameters: {}
      code: |
        const crypto = require('crypto');
        return { state: crypto.randomBytes(16).toString('base64url') };
    buildAuthorizeUrl:
      parameters:
        authorizeUrl:
          type: string
        clientId:
          type: string
        redirectUri:
          type: string
        scopes:
          type: string
        state:
          type: string
        codeChallenge:
          type: string
      code: |
        // No URL/URLSearchParams in the sandbox — build the querystring manually
        const enc = encodeURIComponent;
        const qs = [
          'client_id=' + enc(clientId || ''),
          'redirect_uri=' + enc(redirectUri || ''),
          'response_type=code',
          'state=' + enc(state || ''),
          'scope=' + enc(scopes || 'api refresh_token offline_access'),
          'code_challenge=' + enc(codeChallenge || ''),
          'code_challenge_method=S256'
        ].join('&');
        return { url: (authorizeUrl || '') + '?' + qs };
    buildJwtAssertion:
      parameters:
        clientId:
          type: string
        username:
          type: string
        audience:
          type: string
        privateKey:
          type: string
      code: |
        const crypto = require('crypto');
        try {
          const header = { alg: 'RS256', typ: 'JWT' };
          const now = Math.floor(Date.now() / 1000);
          const claims = {
            iss: clientId,
            sub: username,
            aud: audience,
            exp: now + 300
          };
          const h = Buffer.from(JSON.stringify(header)).toString('base64url');
          const c = Buffer.from(JSON.stringify(claims)).toString('base64url');
          const signingInput = h + '.' + c;
          const signer = crypto.createSign('RSA-SHA256');
          signer.update(signingInput);
          signer.end();
          const sig = signer.sign(privateKey).toString('base64url');
          return { assertion: signingInput + '.' + sig };
        } catch (e) {
          return { error: (e && e.message) || 'JWT signing failed' };
        }
