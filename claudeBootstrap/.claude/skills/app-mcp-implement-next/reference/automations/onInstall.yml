slug: onInstall
name: MCP/onInstall
description: >-
  Provision the tenant app-instance on install/configure (tenant-context model,
  NO HMAC key). Sets the MCP endpoint (this instance's own webhook) + the config
  app link, provisions two tenant secrets — `salesforceNextAuth` (object: auth
  mode + credentials) and `salesforceNextAuthorizedAgents` (agent allowlist) —
  and writes the two-hop bindings so `config.auth` / `config.authorizedAgents`
  resolve. Idempotent.
private: true
when:
  events:
    - workspaces.apps.installed
    - workspaces.apps.configured
do:
  - conditions:
      '!{{run.appInstanceSlug}}':
        - emit:
            event: salesforceNext.onInstall.skipped
            payload:
              reason: no-app-instance-slug
        - break: {}
  - set:
      name: mcpEndpoint
      value: '{{global.apiUrl}}/workspaces/{{global.workspaceId}}/webhooks/{{run.appInstanceSlug}}.mcp'
  - set:
      name: studioHost
      value: '{% replace(URL({{global.apiUrl}}).hostname, "api.", "") %}'
  - set:
      name: configAppUrl
      value: 'https://{{studioHost}}/apps/salesforce-next?workspaceId={{global.workspaceId}}&appInstance={{run.appInstanceSlug}}'
  - set:
      name: oauthCallbackUrl
      value: '{{global.apiUrl}}/workspaces/{{global.workspaceId}}/webhooks/{{run.appInstanceSlug}}.oauthCallback'
  - auth:
      workspace: true
      output: wsJwt
  - set:
      name: secretsUrl
      value: '{{global.apiUrl}}/workspaces/{{global.workspaceId}}/security/secrets'
  - fetch:
      url: '{{secretsUrl}}'
      method: GET
      headers:
        Authorization: Bearer {{wsJwt.jwt}}
      output: existingSecretsResp
      outputMode: detailed_response
      emitErrors: false
  - set:
      name: existingSecrets
      value: '{{existingSecretsResp.body}}'
  - set:
      name: toProvision
      value: {}
  - set:
      name: provisionCount
      value: 0
  - conditions:
      '!{{existingSecrets.salesforceNextAuth}}':
        - set:
            name: toProvision.salesforceNextAuth
            value:
              value: {}
              description: 'Salesforce auth config (managed by the connector config app): { mode, loginHost, jwtUsername, oauthClientId, oauthClientSecret, jwtPrivateKey, accessToken, instanceUrl }.'
        - set:
            name: provisionCount
            value: '{% {{provisionCount}} + 1 %}'
  - conditions:
      '!{{existingSecrets.salesforceNextAuthorizedAgents}}':
        - set:
            name: toProvision.salesforceNextAuthorizedAgents
            value:
              value: ''
              description: 'Comma-separated agentIds authorized to call this connector''s MCP endpoint. Managed by the config app.'
        - set:
            name: provisionCount
            value: '{% {{provisionCount}} + 1 %}'
  - conditions:
      '{{provisionCount}} > 0':
        - fetch:
            url: '{{secretsUrl}}'
            method: PATCH
            headers:
              Authorization: Bearer {{wsJwt.jwt}}
              Content-Type: application/json
            body: '{{toProvision}}'
            output: provisionResp
            outputMode: detailed_response
            emitErrors: false
        - emit:
            event: salesforceNext.onInstall.secretsProvisioned
            payload:
              status: '{{provisionResp.status}}'
              count: '{{provisionCount}}'
  - comment: >-
      Binding B — tenant workspace config.value maps each config key onto its
      secret (a secret reference only resolves inside config.value). Literals
      built via Custom Code. PATCH /config replaces `value`, so GET first + merge.
  - Custom Code.run:
      function: makeSecretRef
      parameters:
        key: salesforceNextAuth
      output: secretRefAuth
  - Custom Code.run:
      function: makeSecretRef
      parameters:
        key: salesforceNextAuthorizedAgents
      output: secretRefAllowlist
  - set:
      name: configUrl
      value: '{{global.apiUrl}}/workspaces/{{global.workspaceId}}/config'
  - fetch:
      url: '{{configUrl}}'
      method: GET
      headers:
        Authorization: Bearer {{wsJwt.jwt}}
      output: curWsConfig
      outputMode: body
      emitErrors: false
  - set:
      name: newWsValue
      value: '{{curWsConfig.value}}'
  - set:
      name: newWsValue.salesforceNextAuth
      value: '{{secretRefAuth}}'
  - set:
      name: newWsValue.salesforceNextAuthorizedAgents
      value: '{{secretRefAllowlist}}'
  - fetch:
      url: '{{configUrl}}'
      method: PATCH
      headers:
        Authorization: Bearer {{wsJwt.jwt}}
        Content-Type: application/json
      body:
        value: '{{newWsValue}}'
      output: wsConfigResp
      outputMode: detailed_response
      emitErrors: false
  - emit:
      event: salesforceNext.onInstall.completed
      payload:
        mcpEndpoint: '{{mcpEndpoint}}'
        secretsProvisioned: '{{provisionCount}}'
  - comment: >-
      Binding A (terminal merge) — instance config keys point at the tenant
      workspace config.value (binding B). `set: config` merge is terminal — keep last.
  - Custom Code.run:
      function: makeConfigRef
      parameters:
        key: salesforceNextAuth
      output: bindingAuth
  - Custom Code.run:
      function: makeConfigRef
      parameters:
        key: salesforceNextAuthorizedAgents
      output: bindingAllowlist
  - set:
      name: config
      type: merge
      value:
        mcpEndpoint: '{{mcpEndpoint}}'
        configAppUrl: '{{configAppUrl}}'
        oauthCallbackUrl: '{{oauthCallbackUrl}}'
        auth: '{{bindingAuth}}'
        authorizedAgents: '{{bindingAllowlist}}'
output: '{{mcpEndpoint}}'
