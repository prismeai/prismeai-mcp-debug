slug: runQuery
name: runQuery
description: Run a SOQL query (excludes deleted/archived) (GET /query). Calls the Salesforce REST API via the resolved per-user OAuth session (or JWT Bearer fallback). Public App-mode automation — tenants call `Salesforce.runQuery:` directly from their own automations.
arguments:
  q:
    type: string
    description: Query param `q`.
  outputFormat:
    type: string
    enum:
      - structured
      - verbose
      - both
    description: Response format.
do:
  - buildAppAuth:
      output: auth
  - conditions:
      '{{auth.error}}':
        - set:
            name: result
            value:
              error: '{{auth.error}}'
        - break: {}
  - set:
      name: methodArgs
      value:
        q: '{{q}}'
  - methodRestOp:
      operationName: runQuery
      args: '{{methodArgs}}'
      accessToken: '{{auth.accessToken}}'
      baseUrl: '{{auth.baseUrl}}'
      output: apiResult
  - conditions:
      '!{{apiResult.success}}':
        - set:
            name: result
            value:
              error: '{{apiResult.error}}'
        - break: {}
  - formatToolOutput:
      operation: read
      itemType: runQuery result
      identifier: runQuery
      structuredData: '{{apiResult.data}}'
      jsonData: '{{apiResult.data}}'
      outputFormat: '{% {{outputFormat}} || "verbose" %}'
      output: result
output: '{{result}}'
