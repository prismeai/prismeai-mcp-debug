slug: formatToolOutput
name: /Helpers/formatToolOutput
description: Format MCP tool output based on outputFormat (structured / verbose / both). Builds a human-readable verbose message per operation type.
private: true
arguments:
  operation:
    type: string
    description: 'Operation type: create, list, read, update, delete, action.'
  structuredData:
    type: object
  outputFormat:
    type: string
  itemType:
    type: string
  itemName:
    type: string
  identifier:
    type: string
  properties:
    type: array
  items:
    type: array
  location:
    type: string
  hint:
    type: string
  jsonData:
    type: object
  additionalInfo:
    type: string
  message:
    type: string
do:
  - conditions:
      '{{operation}} == "create"':
        - set:
            name: propLines
            value: ''
        - repeat:
            'on': '{{properties}}'
            do:
              - set:
                  name: propLines
                  value: '{{propLines}}- **{{item.label}}:** {{item.value}}\n'
        - set:
            name: verboseMessage
            value: |
              {{itemType}} "{{itemName}}" created successfully!

              {{propLines}}
      '{{operation}} == "list"':
        - conditions:
            '{{items.length}} == 0':
              - set:
                  name: verboseMessage
                  value: No {{itemType}} found in {{location}}.
            default:
              - set:
                  name: verboseMessage
                  value: |
                    Found {{items.length}} {{itemType}} in {{location}}:

                    ```json
                    {% json({{items}}) %}
                    ```

                    {{hint}}
      '{{operation}} == "read"':
        - set:
            name: propLines
            value: ''
        - repeat:
            'on': '{{properties}}'
            do:
              - set:
                  name: propLines
                  value: '{{propLines}}**{{item.label}}:** {{item.value}}\n'
        - conditions:
            '{{jsonData}}':
              - set:
                  name: verboseMessage
                  value: |
                    {{itemType}} {{identifier}} retrieved successfully.

                    {{propLines}}
                    ```json
                    {% json({{jsonData}}) %}
                    ```
            default:
              - set:
                  name: verboseMessage
                  value: |
                    {{itemType}} {{identifier}} retrieved successfully.

                    {{propLines}}
      '{{operation}} == "update"':
        - set:
            name: propLines
            value: ''
        - repeat:
            'on': '{{properties}}'
            do:
              - set:
                  name: propLines
                  value: '{{propLines}}- {{item.label}}: {{item.value}}\n'
        - set:
            name: verboseMessage
            value: |
              {{itemType}} {{identifier}} updated successfully.

              **Applied settings:**
              {{propLines}}
      '{{operation}} == "delete"':
        - conditions:
            '{{additionalInfo}}':
              - set:
                  name: verboseMessage
                  value: |
                    {{itemType}} {{identifier}} deleted successfully.

                    {{additionalInfo}}
            default:
              - set:
                  name: verboseMessage
                  value: '{{itemType}} {{identifier}} deleted successfully.'
      '{{operation}} == "action"':
        - set:
            name: verboseMessage
            value: '{% {{message}} || "Action completed successfully." %}'
      default:
        - comment: Fallback verbose — guard against empty structuredData. DELETE endpoints respond HTTP 204 No Content with empty body, so json("") would crash.
        - conditions:
            '{{structuredData}}':
              - set:
                  name: verboseMessage
                  value: '{% json({{structuredData}}) %}'
            default:
              - set:
                  name: verboseMessage
                  value: '{{itemType}} {{identifier}} — operation completed (no content returned).'
  - conditions:
      '{{outputFormat}} == "structured" || {{outputFormat}} == "both"':
        - conditions:
            '{{structuredData}}':
              - set:
                  name: result
                  value:
                    content:
                      - type: text
                        text: '{% json({{structuredData}}) %}'
                    structuredContent: '{{structuredData}}'
            default:
              - set:
                  name: result
                  value:
                    content:
                      - type: text
                        text: '{{verboseMessage}}'
                    structuredContent:
                      operation: '{{operation}}'
                      itemType: '{{itemType}}'
                      identifier: '{{identifier}}'
                      empty: true
      default:
        - set:
            name: result
            value:
              content:
                - type: text
                  text: '{{verboseMessage}}'
output: '{{result}}'
