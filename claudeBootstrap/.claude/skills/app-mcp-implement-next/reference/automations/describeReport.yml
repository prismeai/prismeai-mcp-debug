slug: describeReport
name: describeReport
description: Describe a report (metadata + reportFactWithDetails when ?includeDetails=true) (GET /analytics/reports/{reportId}). Calls the Salesforce REST API via the resolved per-user OAuth session (or JWT Bearer fallback). Public App-mode automation — tenants call `Salesforce.describeReport:` directly from their own automations.
arguments:
  reportId:
    type: string
    description: Path param `reportId` (required).
  includeDetails:
    type: boolean
    description: Query param `includeDetails`.
  outputFormat:
    type: string
    enum:
      - structured
      - verbose
      - both
    description: Response format.
do:
  - buildAppAuth:
      output: auth
  - conditions:
      '{{auth.error}}':
        - set:
            name: result
            value:
              error: '{{auth.error}}'
        - break: {}
  - set:
      name: methodArgs
      value:
        reportId: '{{reportId}}'
        includeDetails: '{{includeDetails}}'
  - methodRestOp:
      operationName: describeReport
      args: '{{methodArgs}}'
      accessToken: '{{auth.accessToken}}'
      baseUrl: '{{auth.baseUrl}}'
      output: apiResult
  - conditions:
      '!{{apiResult.success}}':
        - set:
            name: result
            value:
              error: '{{apiResult.error}}'
        - break: {}
  - formatToolOutput:
      operation: read
      itemType: describeReport result
      identifier: describeReport
      structuredData: '{{apiResult.data}}'
      jsonData: '{{apiResult.data}}'
      outputFormat: '{% {{outputFormat}} || "verbose" %}'
      output: result
output: '{{result}}'
