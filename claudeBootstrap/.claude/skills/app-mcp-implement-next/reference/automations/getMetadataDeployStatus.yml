slug: getMetadataDeployStatus
name: getMetadataDeployStatus
description: Get status + details of a metadata deploy request (GET /metadata/deployRequest/{requestId}). Calls the Salesforce REST API via the resolved per-user OAuth session (or JWT Bearer fallback). Public App-mode automation — tenants call `Salesforce.getMetadataDeployStatus:` directly from their own automations.
arguments:
  requestId:
    type: string
    description: Path param `requestId` (required).
  includeDetails:
    type: boolean
    description: Query param `includeDetails`.
  outputFormat:
    type: string
    enum:
      - structured
      - verbose
      - both
    description: Response format.
do:
  - buildAppAuth:
      output: auth
  - conditions:
      '{{auth.error}}':
        - set:
            name: result
            value:
              error: '{{auth.error}}'
        - break: {}
  - set:
      name: methodArgs
      value:
        requestId: '{{requestId}}'
        includeDetails: '{{includeDetails}}'
  - methodRestOp:
      operationName: getMetadataDeployStatus
      args: '{{methodArgs}}'
      accessToken: '{{auth.accessToken}}'
      baseUrl: '{{auth.baseUrl}}'
      output: apiResult
  - conditions:
      '!{{apiResult.success}}':
        - set:
            name: result
            value:
              error: '{{apiResult.error}}'
        - break: {}
  - formatToolOutput:
      operation: read
      itemType: getMetadataDeployStatus result
      identifier: getMetadataDeployStatus
      structuredData: '{{apiResult.data}}'
      jsonData: '{{apiResult.data}}'
      outputFormat: '{% {{outputFormat}} || "verbose" %}'
      output: result
output: '{{result}}'
