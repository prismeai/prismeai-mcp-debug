slug: whoAmI
name: whoAmI
description: Resolve the org the current Agent Factory API key deploys into, via getAgent.
when:
  endpoint: true
arguments:
  agentId:
    type: string
do:
  - Agents.getAgent:
      agent_id: '{{agentId}}'
      output: agent
output:
  orgSlug: '{{agent.orgSlug}}'
  error: '{{agent.error}}'
  agentName: '{{agent.name}}'
