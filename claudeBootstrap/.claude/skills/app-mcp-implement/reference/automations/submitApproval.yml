slug: submitApproval
name: submitApproval
description: Submit a record into an approval process or act on an existing one (POST /process/approvals). Calls the Salesforce REST API via the resolved per-user OAuth session (or JWT Bearer fallback). Public App-mode automation — tenants call `Salesforce.submitApproval:` directly from their own automations.
arguments:
  requests:
    type: object
    additionalProperties: true
    description: Body field `requests`.
  outputFormat:
    type: string
    enum:
      - structured
      - verbose
      - both
    description: Response format.
do:
  - buildAppAuth:
      output: auth
  - conditions:
      '{{auth.error}}':
        - set:
            name: result
            value:
              error: '{{auth.error}}'
        - break: {}
  - set:
      name: methodArgs
      value:
        requests: '{{requests}}'
  - methodRestOp:
      operationName: submitApproval
      args: '{{methodArgs}}'
      accessToken: '{{auth.accessToken}}'
      baseUrl: '{{auth.baseUrl}}'
      output: apiResult
  - conditions:
      '!{{apiResult.success}}':
        - set:
            name: result
            value:
              error: '{{apiResult.error}}'
        - break: {}
  - formatToolOutput:
      operation: read
      itemType: submitApproval result
      identifier: submitApproval
      structuredData: '{{apiResult.data}}'
      jsonData: '{{apiResult.data}}'
      outputFormat: '{% {{outputFormat}} || "verbose" %}'
      output: result
output: '{{result}}'
