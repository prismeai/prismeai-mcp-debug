slug: listProcessRulesForObject
name: listProcessRulesForObject
description: Process rules for a given sObject (GET /process/rules/{sObjectName}). Calls the Salesforce REST API via the resolved per-user OAuth session (or JWT Bearer fallback). Public App-mode automation — tenants call `Salesforce.listProcessRulesForObject:` directly from their own automations.
arguments:
  sObjectName:
    type: string
    description: Path param `sObjectName` (required).
do:
  - buildAppAuth:
      output: auth
  - conditions:
      '{{auth.error}}':
        - set:
            name: result
            value:
              error: '{{auth.error}}'
        - break: {}
  - set:
      name: methodArgs
      value:
        sObjectName: '{{sObjectName}}'
  - methodRestOp:
      operationName: listProcessRulesForObject
      args: '{{methodArgs}}'
      accessToken: '{{auth.accessToken}}'
      baseUrl: '{{auth.baseUrl}}'
      output: apiResult
  - conditions:
      '!{{apiResult.success}}':
        - set:
            name: result
            value:
              error: '{{apiResult.error}}'
        - break: {}
  - set:
      name: result
      value: '{{apiResult.data}}'
output: '{{result}}'
