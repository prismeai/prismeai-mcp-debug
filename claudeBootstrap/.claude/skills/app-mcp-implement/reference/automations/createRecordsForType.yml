slug: createRecordsForType
name: createRecordsForType
description: Create up to 200 records of the same sObject type (POST /composite/sobjects/{sObjectName}). Calls the Salesforce REST API via the resolved per-user OAuth session (or JWT Bearer fallback). Public App-mode automation — tenants call `Salesforce.createRecordsForType:` directly from their own automations.
arguments:
  sObjectName:
    type: string
    description: Path param `sObjectName` (required).
  allOrNone:
    type: object
    additionalProperties: true
    description: Body field `allOrNone`.
  records:
    type: object
    additionalProperties: true
    description: Body field `records`.
do:
  - buildAppAuth:
      output: auth
  - conditions:
      '{{auth.error}}':
        - set:
            name: result
            value:
              error: '{{auth.error}}'
        - break: {}
  - set:
      name: methodArgs
      value:
        sObjectName: '{{sObjectName}}'
        allOrNone: '{{allOrNone}}'
        records: '{{records}}'
  - methodRestOp:
      operationName: createRecordsForType
      args: '{{methodArgs}}'
      accessToken: '{{auth.accessToken}}'
      baseUrl: '{{auth.baseUrl}}'
      output: apiResult
  - conditions:
      '!{{apiResult.success}}':
        - set:
            name: result
            value:
              error: '{{apiResult.error}}'
        - break: {}
  - set:
      name: result
      value: '{{apiResult.data}}'
output: '{{result}}'
