slug: executeAnonymousApex
name: executeAnonymousApex
description: Run a one-off Apex code block as the current user (GET /tooling/executeAnonymous). Calls the Salesforce REST API via the resolved per-user OAuth session (or JWT Bearer fallback). Public App-mode automation — tenants call `Salesforce.executeAnonymousApex:` directly from their own automations.
arguments:
  anonymousBody:
    type: string
    description: Query param `anonymousBody`.
do:
  - buildAppAuth:
      output: auth
  - conditions:
      '{{auth.error}}':
        - set:
            name: result
            value:
              error: '{{auth.error}}'
        - break: {}
  - set:
      name: methodArgs
      value:
        anonymousBody: '{{anonymousBody}}'
  - methodRestOp:
      operationName: executeAnonymousApex
      args: '{{methodArgs}}'
      accessToken: '{{auth.accessToken}}'
      baseUrl: '{{auth.baseUrl}}'
      output: apiResult
  - conditions:
      '!{{apiResult.success}}':
        - set:
            name: result
            value:
              error: '{{apiResult.error}}'
        - break: {}
  - set:
      name: result
      value: '{{apiResult.data}}'
output: '{{result}}'
