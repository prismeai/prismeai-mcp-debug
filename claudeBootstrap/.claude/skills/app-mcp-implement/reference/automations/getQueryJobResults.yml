slug: getQueryJobResults
name: getQueryJobResults
description: Download CSV results of a completed bulk query job (GET /jobs/query/{jobId}/results). Calls the Salesforce REST API via the resolved per-user OAuth session (or JWT Bearer fallback). Public App-mode automation — tenants call `Salesforce.getQueryJobResults:` directly from their own automations.
arguments:
  jobId:
    type: string
    description: Path param `jobId` (required).
  locator:
    type: string
    description: Query param `locator`.
  maxRecords:
    type: number
    description: Query param `maxRecords`.
do:
  - buildAppAuth:
      output: auth
  - conditions:
      '{{auth.error}}':
        - set:
            name: result
            value:
              error: '{{auth.error}}'
        - break: {}
  - set:
      name: methodArgs
      value:
        jobId: '{{jobId}}'
        locator: '{{locator}}'
        maxRecords: '{{maxRecords}}'
  - methodRestOp:
      operationName: getQueryJobResults
      args: '{{methodArgs}}'
      accessToken: '{{auth.accessToken}}'
      baseUrl: '{{auth.baseUrl}}'
      output: apiResult
  - conditions:
      '!{{apiResult.success}}':
        - set:
            name: result
            value:
              error: '{{apiResult.error}}'
        - break: {}
  - set:
      name: result
      value: '{{apiResult.data}}'
output: '{{result}}'
