slug: createQueryJob
name: createQueryJob
description: Create a bulk SOQL query job (returns jobId for polling) (POST /jobs/query). Calls the Salesforce REST API via the resolved per-user OAuth session (or JWT Bearer fallback). Public App-mode automation — tenants call `Salesforce.createQueryJob:` directly from their own automations.
arguments:
  operation:
    type: object
    additionalProperties: true
    description: Body field `operation`.
  query:
    type: object
    additionalProperties: true
    description: Body field `query`.
  contentType:
    type: object
    additionalProperties: true
    description: Body field `contentType`.
  lineEnding:
    type: object
    additionalProperties: true
    description: Body field `lineEnding`.
  columnDelimiter:
    type: object
    additionalProperties: true
    description: Body field `columnDelimiter`.
do:
  - buildAppAuth:
      output: auth
  - conditions:
      '{{auth.error}}':
        - set:
            name: result
            value:
              error: '{{auth.error}}'
        - break: {}
  - set:
      name: methodArgs
      value:
        operation: '{{operation}}'
        query: '{{query}}'
        contentType: '{{contentType}}'
        lineEnding: '{{lineEnding}}'
        columnDelimiter: '{{columnDelimiter}}'
  - methodRestOp:
      operationName: createQueryJob
      args: '{{methodArgs}}'
      accessToken: '{{auth.accessToken}}'
      baseUrl: '{{auth.baseUrl}}'
      output: apiResult
  - conditions:
      '!{{apiResult.success}}':
        - set:
            name: result
            value:
              error: '{{apiResult.error}}'
        - break: {}
  - set:
      name: result
      value: '{{apiResult.data}}'
output: '{{result}}'
