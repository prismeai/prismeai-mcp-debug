appSlug: Custom Code
slug: Custom Code
config:
  functions:
    # ===================== REQUIRED: MCP auth-install =====================
    generateSignedKey:
      parameters:
        workspaceId:
          type: string
        getConfigUrl:
          type: string
        secret:
          type: string
      code: >
        const crypto = require('crypto');

        const data = JSON.stringify({ wid: workspaceId, url: getConfigUrl });

        const payload = Buffer.from(data).toString('base64url');

        const signature = crypto.createHmac('sha256',
        secret).update(data).digest('hex');

        return payload + '.' + signature;

    verifyAndDecodeKey:
      parameters:
        apiKey:
          type: string
        secret:
          type: string
      code: >
        const crypto = require('crypto');

        const parts = (apiKey || '').split('.');

        if (parts.length !== 2) return { error: 'Invalid key format' };

        const data = Buffer.from(parts[0], 'base64url').toString();

        const expected = crypto.createHmac('sha256',
        secret).update(data).digest('hex');

        if (parts[1] !== expected) return { error: 'Invalid signature' };

        try {
          const parsed = JSON.parse(data);
          return { workspaceId: parsed.wid, getConfigUrl: parsed.url };
        } catch (e) {
          return { error: 'Invalid payload' };
        }

    # Generates a 256-bit random hex secret. Used by generateKey.yml to
    # self-heal an empty appSecret on the first key request. Parameterless on
    # purpose (avoids any `type: array` param that would break the whole module).
    generateRandomSecret:
      code: >
        const crypto = require('crypto');

        return crypto.randomBytes(32).toString('hex');

    # Returns { usable: true } only when the value is a real, resolved secret.
    # On the central workspace an UNSET secret makes {{config.appSecret}} resolve
    # to the literal "{{secret.appSecret}}" (a truthy string), so a plain
    # !{{config.x}} check is not enough. We detect the unresolved-binding literal
    # here because a `matches` DSUL condition on the brace-prefix crashes on a
    # literal binding value (InvalidVariableNameError).
    isUsableSecret:
      parameters:
        value:
          type: string
      code: |
        const v = (value === null || value === undefined) ? '' : String(value);
        return { usable: v.length > 0 && v.indexOf('{{') === -1 };

    # Build the literal binding string "{{config.<key>}}" in plain JS so DSUL
    # never parses it as a token. Used by onInstall (Phase 4 step 11) to write
    # **binding A** into the app instance config — single-pass substitution
    # stores the literal, which resolves later against the tenant workspace
    # config.value (binding B). MANDATORY for any connector with tenant
    # secrets (static token, PAT, OAuth, …).
    makeConfigRef:
      parameters:
        key:
          type: string
      code: |
        return '{' + '{config.' + key + '}' + '}';

    # Build the literal binding string "{{secret.<key>}}" in plain JS.
    # Used by onInstall to write **binding B** into the tenant workspace
    # config.value (the only place {{secret.x}} resolves). MANDATORY companion
    # to makeConfigRef.
    makeSecretRef:
      parameters:
        key:
          type: string
      code: |
        return '{' + '{secret.' + key + '}' + '}';

    # Short non-reversible fingerprint of a credential, used to KEY the session
    # token cache in buildAppAuth (exchange/cached-auth connectors only). When the
    # configured credential changes, the fingerprint changes and the cached access
    # token is invalidated — prevents serving a token exchanged from an old PAT.
    # See the "session-cached auth token" trap in SKILL.md. Drop it for pure
    # static-token connectors that never exchange/cache.
    tokenFingerprint:
      parameters:
        value:
          type: string
      code: |
        const crypto = require('crypto');
        const v = (value === null || value === undefined) ? '' : String(value);
        return crypto.createHash('sha256').update(v).digest('hex').slice(0, 16);

    # ===================== GENERAL HELPERS =====================
    buildQueryString:
      parameters:
        params:
          type: object
      code: |
        const p = params || {};
        const parts = [];
        for (const [k, v] of Object.entries(p)) {
          if (v === null || v === undefined || v === '') continue;
          parts.push(encodeURIComponent(k) + '=' + encodeURIComponent(String(v)));
        }
        return parts.length ? '?' + parts.join('&') : '';

    pruneEmpty:
      parameters:
        obj:
          type: object
      code: |
        const o = obj || {};
        const out = {};
        for (const [k, v] of Object.entries(o)) {
          if (v === null || v === undefined || v === '') continue;
          if (Array.isArray(v) && v.length === 0) continue;
          out[k] = v;
        }
        return out;

    # ===================== REQUIRED: Operation + entity registry =====================
    # The dispatcher pattern (entity grouping) needs three things to route a
    # tool call (toolName, action) to a real HTTP request:
    #   1. ENTITY_OPS — map entity → action → operationName
    #   2. OPERATIONS — map operationName → { method, path, parameters, body, graphql }
    #   3. resolveToolAction — entry point used by routeToolCall.yml
    #   4. getOperation — entry point used by routeToolCall.yml + tool-restOp.yml
    # Both registries are generated from `swagger.yml` by the Phase 5 script.

    resolveToolAction:
      parameters:
        toolName:
          type: string
        action:
          type: string
      code: |
        // <<GENERATED>> by Phase 5 — keep ENTITY_OPS in sync with index.yml mcpTools
        const ENTITY_OPS = {
          // 'workbooks': { 'list': 'listWorkbooks', 'get': 'getWorkbook', ... },
          // 'projects': { 'list': 'listProjects', 'create': 'createProject', ... },
        };
        const ent = ENTITY_OPS[toolName];
        if (!ent) return { error: 'Unknown entity: ' + toolName + '. Available: ' + Object.keys(ENTITY_OPS).sort().join(', ') };
        if (!action) return { error: 'Missing required argument `action` for ' + toolName + '. Available actions: ' + Object.keys(ent).sort().join(', ') };
        const op = ent[action];
        if (!op) return { error: 'Unknown action `' + action + '` for entity `' + toolName + '`. Available actions: ' + Object.keys(ent).sort().join(', ') };
        return { operationName: op };

    getOperation:
      parameters:
        operationName:
          type: string
      code: |
        // <<GENERATED>> by Phase 5 — built from swagger.yml; keep in sync.
        const OPERATIONS = {
          // 'listWorkbooks': { method: 'GET', path: '/sites/{siteId}/workbooks', graphql: false, parameters: [...] },
          // 'metadataQuery': { method: 'POST', path: '/api/metadata/graphql', graphql: true },
        };
        const op = OPERATIONS[operationName];
        if (!op) return { error: 'Unknown operation: ' + operationName };
        return op;

    # ===================== OPTIONAL: GraphQL registry =====================
    # If the service exposes a GraphQL API, keep this function and list all
    # operations + their queries here. Otherwise delete it.
    #
    # getGraphqlQuery:
    #   parameters:
    #     operationName: { type: string }
    #   code: |
    #     const FIELDS = `id name ...`;
    #     const queries = {
    #       getItems: { rootField: 'getItems', query: `query getItems($jql: String, $limit: Int!) { getItems(jql: $jql, limit: $limit) { total results { ${FIELDS} } } }` },
    #       // ...
    #     };
    #     const entry = queries[operationName];
    #     if (!entry) return { error: 'Unknown operation: ' + operationName };
    #     return { query: entry.query, rootField: entry.rootField };
