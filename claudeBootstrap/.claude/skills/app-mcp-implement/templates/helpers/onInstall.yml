slug: onInstall
name: 00_MCP/onInstall
description: >-
  On install of the <<SERVICE_NAME>> app in a tenant workspace, request a
  signed MCP API key from the central <<SERVICE_NAME>> workspace. The key
  encodes the tenant workspace ID and the getConfig URL, and is stored in the
  tenant's config so the central endpoint can verify future calls.
private: true
when:
  events:
    - workspaces.apps.installed
    - workspaces.apps.configured
do:
  - emit:
      event: <<SERVICE_SLUG>>.onInstall.started
      payload:
        appInstanceSlug: '{{run.appInstanceSlug}}'
        workspaceId: '{{global.workspaceId}}'
        apiUrl: '{{global.apiUrl}}'
        hasMcpApiKey: '{{config.mcpApiKey}}'
  - conditions:
      '!{{run.appInstanceSlug}}':
        - emit:
            event: <<SERVICE_SLUG>>.onInstall.skipped
            payload:
              reason: no-app-instance-slug
        - break: {}
  - comment: >-
      Skip only if mcpApiKey is a proper signed key (base64url payload + "."
      + 64 hex chars). A loose `matches "\."` wrongly matches a garbage
      error-object sérialisation (stack traces contain dots) and can lock
      the app in a broken state.
  - conditions:
      '{{config.mcpApiKey}} matches "^[A-Za-z0-9_-]+\\.[a-f0-9]{64}$"':
        - emit:
            event: <<SERVICE_SLUG>>.onInstall.skipped
            payload:
              reason: key-already-set
        - break: {}
  - set:
      name: getConfigUrl
      value: >-
        {{global.apiUrl}}/workspaces/{{global.workspaceId}}/webhooks/{{run.appInstanceSlug}}.getConfig
  - emit:
      event: <<SERVICE_SLUG>>.onInstall.callingGenerateKey
      payload:
        getConfigUrl: '{{getConfigUrl}}'
        generateKeyUrl: '{{global.apiUrl}}/workspaces/slug:<<SERVICE_SLUG>>/webhooks/generateKey'
  - fetch:
      url: '{{global.apiUrl}}/workspaces/slug:<<SERVICE_SLUG>>/webhooks/generateKey'
      method: POST
      headers:
        Content-Type: application/json
      body:
        workspaceId: '{{global.workspaceId}}'
        getConfigUrl: '{{getConfigUrl}}'
      output: keyResponse
      outputMode: detailed_response
      emitErrors: false
  - emit:
      event: <<SERVICE_SLUG>>.onInstall.generateKeyResponse
      payload:
        status: '{{keyResponse.status}}'
        body: '{{keyResponse.body}}'
  - conditions:
      '{{keyResponse.status}} != 200':
        - emit:
            event: <<SERVICE_SLUG>>.onInstall.failed
            payload:
              status: '{{keyResponse.status}}'
              body: '{{keyResponse.body}}'
        - break: {}
  - comment: >-
      Shape-validate the returned key before merging. Belt-and-braces: even
      if generateKey returns 200, the body.mcpApiKey must match the real
      signed-key format — rejects any garbage that slipped past generateKey's
      own checks.
  - conditions:
      '!{{keyResponse.body.mcpApiKey}} matches "^[A-Za-z0-9_-]+\\.[a-f0-9]{64}$"':
        - emit:
            event: <<SERVICE_SLUG>>.onInstall.failed
            payload:
              reason: invalid-key-shape
              body: '{{keyResponse.body}}'
        - break: {}
  - set:
      name: mcpEndpoint
      value: '{{global.apiUrl}}/workspaces/slug:<<SERVICE_SLUG>>/webhooks/mcp'
  - comment: >-
      Compute the OAuth callback URL for the `oauthCallbackUrl` readOnly config
      field. Admin copies it into the provider's OAuth app "Redirect URI".
      slug:<<SERVICE_SLUG>> keeps the URL stable across central-workspace
      recreations. Harmless for non-OAuth apps (unused field).
  - set:
      name: oauthCallbackUrl
      value: '{{global.apiUrl}}/workspaces/slug:<<SERVICE_SLUG>>/webhooks/oauthCallback'
  # <<TENANT_SECRET_PROVISION_HOOK>> — Phase 4 step 11 inserts the
  # tenant-secret provisioning + binding A/B block HERE for any connector
  # that exposes credentials in `secrets.schema` (apiKey / token / OAuth
  # client id+secret / …). Skip the block ONLY if the app has zero
  # tenant-sensitive credentials.
  # OAuth connectors (Phase 4.5) reuse the same block — they just add
  # `oauthClientId` and `oauthClientSecret` to the list of provisioned
  # secrets and to the binding A merge below.
  - comment: >-
      The `set: config` merge below is TERMINAL — persisting config re-triggers
      `workspaces.apps.configured`, which ends this run. Any instruction placed
      AFTER it (emits, fetches, more sets) is silently skipped. So emit
      `completed` and run any side-effects BEFORE this point, and keep the
      config merge as the very last instruction.
  - emit:
      event: <<SERVICE_SLUG>>.onInstall.completed
      payload:
        mcpEndpoint: '{{mcpEndpoint}}'
        hasKey: true
  - set:
      name: config
      type: merge
      value:
        mcpApiKey: '{{keyResponse.body.mcpApiKey}}'
        mcpEndpoint: '{{mcpEndpoint}}'
        oauthCallbackUrl: '{{oauthCallbackUrl}}'
        # <<TENANT_SECRET_BINDING_A>> — Phase 4 step 11 adds binding A here for
        # each tenant credential, consuming the makeConfigRef literals built in
        # the provisioning block above. Examples:
        #   apiKey: '{{bindingApiKey}}'            # static-token connector
        #   token: '{{bindingToken}}'              # PAT-style connector
        #   oauthClientId: '{{bindingClientId}}'   # OAuth (Phase 4.5)
        #   oauthClientSecret: '{{bindingClientSecret}}'
output: '{{keyResponse.body.mcpApiKey}}'
