workspaceId: <<WORKSPACE_ID>>
groups:
  - extended
dependsOn:
  - app/Custom Code
  - app/MCP Core
app:
  # ⚠️ slug MUST be PascalCase (no spaces, no hyphens, no MCP/APP suffix).
  # Examples: GoogleDocs, GoogleDrive, Hubspot, SageX3, Storage.
  # IMMUTABLE once published — the marketplace rejects a republish with a
  # different slug ("Once published, an app slug cannot be updated").
  slug: <<APP_SLUG>>
  # Human-readable display name — free form, may include spaces/accents.
  name: <<SERVICE_NAME>>
  description: >-
    MCP server and Prisme.ai app for <<SERVICE_NAME>>.
