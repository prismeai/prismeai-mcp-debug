slug: initiateOAuth
name: 00_OAuth/initiateOAuth
description: |-
  Generate PKCE + state CSRF, store them in user session scope, then redirect the user (HTML meta-refresh) to the central <<SERVICE_NAME>> authorize endpoint. Called by the frontend connector card (popup window) or by the `connect` MCP tool.

  Central mode only — the OAuth provider config (clientId/Secret/urls/scopes) comes from this workspace's own `config.value`, which is fed by the workspace secrets `<<SERVICE_SLUG>>OauthClientId` / `<<SERVICE_SLUG>>OauthClientSecret`. No `mcp-api-key` required.

  Optional query params:
    - `redirectTo`: the callback page URL the popup will be sent back to after OAuth completes. Validated against the platform host.
private: true
when:
  endpoint: true
do:
  - comment: Require authenticated user (user session needed for user-scoped secrets)
  - conditions:
      '!{{user.id}}':
        - set:
            name: $http
            value:
              status: 401
        - set:
            name: output
            value: Authentication required. Please log in to Prisme.ai first.
        - break: {}
  - comment: Read central OAuth config from this workspace's config.value (= secrets)
  - set:
      name: tenantOAuth
      value:
        clientId: '{{config.oauthClientId}}'
        clientSecret: '{{config.oauthClientSecret}}'
        authorizationUrl: '{{config.authorizationUrl}}'
        tokenUrl: '{{config.tokenUrl}}'
        revocationUrl: '{{config.revocationUrl}}'
        scopes: '{{config.scopes}}'
        refreshTokenTtl: '{{config.refreshTokenTtl}}'
  - conditions:
      '!{{tenantOAuth.clientId}}':
        - set:
            name: $http
            value:
              status: 500
        - set:
            name: output
            value: <<SERVICE_NAME>> OAuth is not configured on the service workspace. A workspace admin must set the secrets `<<SERVICE_SLUG>>OauthClientId` and `<<SERVICE_SLUG>>OauthClientSecret`.
        - break: {}
  - comment: Generate PKCE verifier + challenge
  - Custom Code.run:
      function: generatePkce
      output: pkce
  - comment: Generate CSRF state
  - Custom Code.run:
      function: generateState
      output: stateResult
  - comment: Store pending OAuth state in user scope (survives redirect to <<SERVICE_NAME>>). No tenantId — central scope only.
  - set:
      name: user.<<SERVICE_SLUG>>.oauthPending
      scope: user
      value:
        codeVerifier: '{{pkce.codeVerifier}}'
        state: '{{stateResult.state}}'
        scope: central
        createdAt: '{{run.date}}'
  - comment: Validate redirectTo to prevent open-redirect (same platform host only)
  - conditions:
      '{{query.redirectTo}} matches "https://"':
        - set:
            name: platformHost
            value: '{% replace(URL({{global.apiUrl}}).hostname, "api.", "") %}'
        - conditions:
            '{{query.redirectTo}} matches {{platformHost}}':
              - set:
                  name: user.<<SERVICE_SLUG>>.oauthPending
                  scope: user
                  type: merge
                  value:
                    redirectTo: '{{query.redirectTo}}'
  - comment: Build authorize URL with URL-encoded params (central OAuth app)
  - Custom Code.run:
      function: buildAuthorizeUrl
      parameters:
        authorizeUrl: '{{tenantOAuth.authorizationUrl}}'
        clientId: '{{tenantOAuth.clientId}}'
        redirectUri: '{{global.apiUrl}}/workspaces/slug:<<SERVICE_SLUG>>/webhooks/oauthCallback'
        scopes: '{{tenantOAuth.scopes}}'
        state: '{{stateResult.state}}'
        codeChallenge: '{{pkce.codeChallenge}}'
      output: urlResult
  - comment: HTML meta-refresh redirect (SSO gateway intercepts HTTP 302 on webhooks)
  - set:
      name: $http
      value:
        headers:
          Content-Type: text/html
  - set:
      name: output
      value: <html><head><meta http-equiv="refresh" content="0;url={{urlResult.url}}"><title>Redirecting to <<SERVICE_NAME>>...</title></head><body><p>Redirecting to <<SERVICE_NAME>> login...</p><script>window.location.href="{{urlResult.url}}";</script></body></html>
output: '{{output}}'
