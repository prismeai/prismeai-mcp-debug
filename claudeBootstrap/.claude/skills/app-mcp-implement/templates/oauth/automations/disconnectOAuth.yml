slug: disconnectOAuth
name: 00_OAuth/disconnectOAuth
description: |-
  Revoke the current user's OAuth tokens and delete the user-scoped secrets. Works as both:
    - A webhook endpoint (called by the frontend connect card's "Disconnect" button — uses the central scope).
    - An internal automation (called by method-disconnect with scope + tenantConfig args).
private: true
when:
  endpoint: true
arguments:
  tenantId:
    type: string
  scope:
    type: string
  tenantConfig:
    type: object
do:
  - conditions:
      '{{scope}}':
        - comment: Internal call — use args directly
        - set:
            name: effectiveScope
            value: '{{scope}}'
        - set:
            name: effectiveTenantConfig
            value: '{{tenantConfig}}'
        - set:
            name: isWebhook
            value: false
      default:
        - comment: Webhook call — default to central scope; OAuth config from this workspace's config.value
        - set:
            name: isWebhook
            value: true
        - conditions:
            '!{{user.id}}':
              - set:
                  name: $http
                  value:
                    status: 401
              - set:
                  name: output
                  value: Authentication required. Please log in to Prisme.ai first.
              - break: {}
        - set:
            name: effectiveScope
            value: central
        - set:
            name: effectiveTenantConfig
            value:
              oauth:
                clientId: '{{config.oauthClientId}}'
                clientSecret: '{{config.oauthClientSecret}}'
                revocationUrl: '{{config.revocationUrl}}'
  - run:
      module: secrets
      function: get
      parameters:
        name: delegated_token_{{effectiveScope}}
        scope: user
      output: accessTokenRef
  - run:
      module: secrets
      function: get
      parameters:
        name: refresh_token_{{effectiveScope}}
        scope: user
      output: refreshTokenRef
  - conditions:
      '!{{accessTokenRef.error}} && {{effectiveTenantConfig.oauth.revocationUrl}} && {{effectiveTenantConfig.oauth.clientId}}':
        - try:
            do:
              - fetch:
                  method: POST
                  url: '{{effectiveTenantConfig.oauth.revocationUrl}}'
                  headers:
                    Content-Type: application/x-www-form-urlencoded
                  body:
                    client_id: '{{effectiveTenantConfig.oauth.clientId}}'
                    client_secret: '{{effectiveTenantConfig.oauth.clientSecret}}'
                    token: '{{accessTokenRef}}'
                    token_type_hint: access_token
                  emitErrors: false
            catch: []
  - conditions:
      '!{{refreshTokenRef.error}} && {{effectiveTenantConfig.oauth.revocationUrl}} && {{effectiveTenantConfig.oauth.clientId}}':
        - try:
            do:
              - fetch:
                  method: POST
                  url: '{{effectiveTenantConfig.oauth.revocationUrl}}'
                  headers:
                    Content-Type: application/x-www-form-urlencoded
                  body:
                    client_id: '{{effectiveTenantConfig.oauth.clientId}}'
                    client_secret: '{{effectiveTenantConfig.oauth.clientSecret}}'
                    token: '{{refreshTokenRef}}'
                    token_type_hint: refresh_token
                  emitErrors: false
            catch: []
  - try:
      do:
        - run:
            module: secrets
            function: delete
            parameters:
              name: delegated_token_{{effectiveScope}}
              scope: user
      catch: []
  - try:
      do:
        - run:
            module: secrets
            function: delete
            parameters:
              name: refresh_token_{{effectiveScope}}
              scope: user
      catch: []
  - delete:
      name: user.<<SERVICE_SLUG>>.oauth
  - comment: Bump user.connectorsVersion so per-user connector caches upstream can invalidate and re-check the now-disconnected state.
  - set:
      name: user.connectorsVersion
      scope: user
      value: '{{run.date}}'
  - emit:
      event: <<SERVICE_SLUG>>.oauth.disconnected
      payload:
        userId: '{{user.id}}'
        scope: '{{effectiveScope}}'
  - conditions:
      '{{isWebhook}}':
        - comment: Webhook — redirect to the SPA which renders the disconnected card + auto-close
        - set:
            name: studioHostname
            value: '{% replace(URL({{global.apiUrl}}).hostname, "api.", "") %}'
        - set:
            name: $http
            value:
              headers:
                Content-Type: text/html
        - set:
            name: output
            value: <html><head><meta http-equiv="refresh" content="0;url=https://{{studioHostname}}/apps/<<SERVICE_SLUG>>?status=disconnected&catalog_id=connector-<<SERVICE_SLUG>>"><title>Disconnected</title></head><body><p>Disconnecting…</p></body></html>
      default:
        - set:
            name: output
            value:
              disconnected: true
              scope: '{{effectiveScope}}'
output: '{{output}}'
