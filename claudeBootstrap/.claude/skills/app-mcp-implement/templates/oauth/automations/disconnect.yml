slug: disconnect
name:
  fr: Se déconnecter de <<SERVICE_NAME>>
  en: Disconnect from <<SERVICE_NAME>>
description: Disconnect the current user's central <<SERVICE_NAME>> OAuth session. Revokes tokens at the provider (RFC 7009) and deletes the platform secrets stored under the central scope.
do:
  - set:
      name: scope
      value: central
  - set:
      name: tenantConfig
      value:
        oauth:
          clientId: '{{config.oauthClientId}}'
          clientSecret: '{{config.oauthClientSecret}}'
          revocationUrl: '{{config.revocationUrl}}'
  - disconnectOAuth:
      scope: '{{scope}}'
      tenantConfig: '{{tenantConfig}}'
      output: result
output: '{{result}}'
