slug: connect
name:
  fr: Connecter un compte <<SERVICE_NAME>>
  en: Connect a <<SERVICE_NAME>> account
description: |-
  Produce a connect URL for the current user to authorize <<SERVICE_NAME>> access with their own account via the central OAuth shared by the <<SERVICE_NAME>> service workspace. The user is redirected to `initiateOAuth` on the central workspace; tokens are stored in the calling user's scope under the `central` key.
do:
  - set:
      name: connectUrl
      value: '{{global.apiUrl}}/workspaces/slug:<<SERVICE_SLUG>>/webhooks/initiateOAuth'
  - set:
      name: output
      value:
        operation: action
        itemType: <<SERVICE_NAME>> connection
        message: 'Open this URL to authorize <<SERVICE_NAME>> access with your own account: {{connectUrl}}'
        structuredData:
          type: connector_auth_required
          catalog_id: connector-<<SERVICE_SLUG>>
          name: <<SERVICE_NAME>>
          auth_type: oauth2
          connect_url: '{{connectUrl}}'
output: '{{output}}'
