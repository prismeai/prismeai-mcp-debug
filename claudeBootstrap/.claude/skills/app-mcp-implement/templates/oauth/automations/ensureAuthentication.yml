slug: ensureAuthentication
name: /01_Helpers/ensureAuthentication
description: |-
  Resolve an access token for the current MCP tool call.
   - CENTRAL mode (authMode=central, scope=central): user-delegated OAuth shared by the service workspace. Tries the stored access_token first, falls back to refresh; on failure → needsConnect.
   - TENANT mode (authMode=tenant, scope=tenant_<id>): static PAT from tenantConfig.accessToken. No OAuth.
  Returns { authenticated, accessToken, baseUrl, authMethod } or { authenticated: false, needsConnect, message }.
private: true
arguments:
  tenantId:
    type: string
    description: '"central" in CENTRAL mode, the tenant workspaceId in TENANT mode.'
  scope:
    type: string
    description: Secret-store scope key. "central" in CENTRAL mode, "tenant_<id>" in TENANT mode.
  authMode:
    type: string
    description: '"central" or "tenant".'
  tenantConfig:
    type: object
    description: Tenant config (accessToken + oauth block).
do:
  - set:
      name: effectiveBaseUrl
      value: '{% {{tenantConfig.baseUrl}} || "<<BASE_URL>>" %}'
  - set:
      name: output
      value:
        authenticated: false
        needsConnect: false
        message: <<SERVICE_NAME>> is not configured. Workspace admin must set either a tenant PAT or the central OAuth secrets.
  - set:
      name: resolved
      value: false
  - comment: 'Priority 1: CENTRAL mode — user-delegated OAuth. Try stored access_token first; fall back to refresh if missing.'
  - conditions:
      '!{{resolved}} && {{authMode}} == "central" && {{user.<<SERVICE_SLUG>>.oauth.authMethod}} == "delegated" && {{user.<<SERVICE_SLUG>>.oauth.scope}} == "central"':
        - run:
            module: secrets
            function: get
            parameters:
              name: delegated_token_{{scope}}
              scope: user
            output: accessTokenRef
        - conditions:
            '!{{accessTokenRef.error}}':
              - set:
                  name: output
                  value:
                    authenticated: true
                    accessToken: '{{accessTokenRef}}'
                    baseUrl: '{{effectiveBaseUrl}}'
                    authMethod: delegated
              - set:
                  name: resolved
                  value: true
            default:
              - refreshOAuthToken:
                  scope: '{{scope}}'
                  tenantConfig: '{{tenantConfig}}'
                  output: refreshResult
              - conditions:
                  '{{refreshResult.error}}':
                    - comment: Refresh failed — clear stale oauth state so the user is prompted to reconnect cleanly.
                    - delete:
                        name: user.<<SERVICE_SLUG>>.oauth
                  default:
                    - set:
                        name: output
                        value:
                          authenticated: true
                          accessToken: '{{refreshResult.accessToken}}'
                          baseUrl: '{{effectiveBaseUrl}}'
                          authMethod: delegated
                    - set:
                        name: resolved
                        value: true
  - comment: 'Priority 2: TENANT mode — static PAT'
  - conditions:
      '!{{resolved}} && {{authMode}} == "tenant" && {{tenantConfig.accessToken}}':
        - set:
            name: output
            value:
              authenticated: true
              accessToken: '{{tenantConfig.accessToken}}'
              baseUrl: '{{effectiveBaseUrl}}'
              authMethod: tenant_pat
        - set:
            name: resolved
            value: true
  - comment: 'Priority 3: CENTRAL mode — OAuth configured but user not connected → prompt connect'
  - conditions:
      '!{{resolved}} && {{authMode}} == "central" && {{tenantConfig.oauth.clientId}}':
        - set:
            name: output
            value:
              authenticated: false
              needsConnect: true
              message: <<SERVICE_NAME>> is not connected for this user. Authorize access with your own <<SERVICE_NAME>> account to continue.
        - set:
            name: resolved
            value: true
  - comment: 'Priority 4: TENANT mode — no PAT configured → explicit error'
  - conditions:
      '!{{resolved}} && {{authMode}} == "tenant"':
        - set:
            name: output
            value:
              authenticated: false
              needsConnect: false
              message: This <<SERVICE_NAME>> tenant has no Personal Access Token configured. Set the workspace secret `<<SERVICE_SLUG>>Token` to enable tenant PAT mode, or call the MCP endpoint without `mcp-api-key` to use central OAuth.
        - set:
            name: resolved
            value: true
output: '{{output}}'
