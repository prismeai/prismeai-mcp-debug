slug: checkAuthStatus
name: 00_OAuth/checkAuthStatus
description: |-
  Return the central OAuth connection status for the current user. No query params required — the central scope is shared by all callers. Returns { connected, expiresAt, authMethod, scopes, scope }.
private: true
when:
  endpoint: true
do:
  - set:
      name: output
      value:
        connected: false
  - conditions:
      '!{{user.id}}':
        - set:
            name: $http
            value:
              status: 401
        - set:
            name: output
            value:
              connected: false
              error: Authentication required.
        - break: {}
  - set:
      name: scope
      value: central
  - comment: Verify the session matches the central scope + secret still exists
  - conditions:
      '{{user.<<SERVICE_SLUG>>.oauth.authMethod}} == "delegated" && {{user.<<SERVICE_SLUG>>.oauth.scope}} == "central"':
        - run:
            module: secrets
            function: get
            parameters:
              name: delegated_token_{{scope}}
              scope: user
            output: tokenRef
        - conditions:
            '!{{tokenRef.error}}':
              - set:
                  name: output
                  value:
                    connected: true
                    authMethod: delegated
                    expiresAt: '{{user.<<SERVICE_SLUG>>.oauth.expiresAt}}'
                    scopes: '{{user.<<SERVICE_SLUG>>.oauth.scopes}}'
                    connectedAt: '{{user.<<SERVICE_SLUG>>.oauth.connectedAt}}'
                    scope: central
output: '{{output}}'
