# DEPRECATED — OAuth centralisé.
#
# Avec le nouveau modèle (cf. SKILL.md Phase 4.5), il n'y a plus de
# provisioning per-tenant des secrets OAuth ni de binding A/B OAuth :
# les credentials clientId/Secret vivent dans les secrets DU WORKSPACE
# DE SERVICE (cf. fragments/index-secrets-schema.yml), pas dans le
# workspace du tenant qui installe l'App.
#
# Le bloc onInstall standard (templates/helpers/onInstall.yml) conserve
# uniquement le provisioning du PAT (`<<SERVICE_SLUG>>Token`) via le
# fragment générique templates/fragments/onInstall-tenant-secret-provision.yml,
# et le binding A `token: '{{config.<<SERVICE_SLUG>>Token}}'`.
#
# Ne PAS injecter ce fichier en Phase 4.5. Il est conservé pour signaler
# explicitement l'obsolescence — à supprimer à terme.
