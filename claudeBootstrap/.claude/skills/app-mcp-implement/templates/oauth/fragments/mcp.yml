slug: mcp
name: 00_MCP/endpoint
description: |-
  Central MCP JSON-RPC 2.0 endpoint for <<SERVICE_NAME>>. Two modes:
   - CENTRAL (no `mcp-api-key` header): the caller's Prisme.ai user identity is used. The <<SERVICE_NAME>> OAuth provider config comes from the service workspace's own `config.value` (sourced from workspace secrets <<SERVICE_SLUG>>OauthClient*). Access token is user-delegated and stored in user-scope secrets under `delegated_token_central`.
   - TENANT (with `mcp-api-key` header): the HMAC-signed key encodes a tenant workspaceId and getConfigUrl. The tenant config provides a static PAT (`token`). No OAuth in tenant mode (OAuth is centralised).
  `connect`/`disconnect` tools exist only in CENTRAL mode and are filtered out of `tools/list` in TENANT mode.
private: true
when:
  endpoint: true
do:
  - set:
      name: authMode
      value: central
  - conditions:
      '{{headers["mcp-api-key"]}}':
        - set:
            name: authMode
            value: tenant
  - conditions:
      '{{body.method}} == "tools/call"':
        - set:
            name: toolName
            value: '{{body.params.name}}'
        - comment: Branch on auth mode — resolve tenantConfig + scope
        - conditions:
            '{{authMode}} == "central"':
              - comment: CENTRAL mode — require authenticated Prisme.ai user
              - conditions:
                  '!{{user.id}}':
                    - set:
                        name: response
                        value:
                          jsonrpc: '2.0'
                          id: '{{body.id}}'
                          error:
                            code: -32001
                            message: 'Authentication required: please sign in to Prisme.ai before calling the <<SERVICE_NAME>> MCP without an `mcp-api-key` header.'
                    - break: {}
              - set:
                  name: tenantId
                  value: central
              - set:
                  name: scope
                  value: central
              - set:
                  name: tenantConfig
                  value:
                    accessToken: ''
                    baseUrl: '{{config.baseUrl}}'
                    oauth:
                      clientId: '{{config.oauthClientId}}'
                      clientSecret: '{{config.oauthClientSecret}}'
                      authorizationUrl: '{{config.authorizationUrl}}'
                      tokenUrl: '{{config.tokenUrl}}'
                      revocationUrl: '{{config.revocationUrl}}'
                      scopes: '{{config.scopes}}'
                      refreshTokenTtl: '{{config.refreshTokenTtl}}'
            default:
              - comment: TENANT mode — verify mcp-api-key, decode tenantId, fetch tenant config
              - Custom Code.run:
                  function: verifyAndDecodeKey
                  parameters:
                    apiKey: '{{headers["mcp-api-key"]}}'
                    secret: '{{config.appSecret}}'
                  output: decoded
              - conditions:
                  '{{decoded.error}}':
                    - set:
                        name: response
                        value:
                          jsonrpc: '2.0'
                          id: '{{body.id}}'
                          error:
                            code: -32001
                            message: 'Invalid API key: {{decoded.error}}'
                    - break: {}
              - set:
                  name: tenantId
                  value: '{{decoded.workspaceId}}'
              - set:
                  name: scope
                  value: tenant_{{decoded.workspaceId}}
              - comment: Persist the mcp-api-key in session so that initiateOAuth (if ever called from tenant mode for legacy reasons) can identify the tenant.
              - set:
                  name: session.mcpApiKey
                  value: '{{headers["mcp-api-key"]}}'
              - comment: Tenant config 10-min session cache
              - conditions:
                  '{{session.tenantConfig[{{tenantId}}].baseUrl}} and {{session.tenantConfig[{{tenantId}}].expiresAt}} > {% date({{run.date}}).ts %}':
                    - set:
                        name: tenantConfig
                        value: '{{session.tenantConfig[{{tenantId}}]}}'
                  default:
                    - fetch:
                        url: '{{decoded.getConfigUrl}}'
                        method: GET
                        output: credResponse
                        outputMode: detailed_response
                        emitErrors: false
                    - conditions:
                        '{{credResponse.status}} != 200':
                          - set:
                              name: response
                              value:
                                jsonrpc: '2.0'
                                id: '{{body.id}}'
                                error:
                                  code: -32001
                                  message: 'Tenant config lookup failed ({{credResponse.status}}): {{credResponse.body.error}}'
                          - break: {}
                    - set:
                        name: tenantConfig
                        value:
                          accessToken: '{{credResponse.body.accessToken}}'
                          baseUrl: '{{credResponse.body.baseUrl}}'
                          oauth: {}
                          getConfigUrl: '{{decoded.getConfigUrl}}'
                          expiresAt: '{% date({{run.date}}).ts + 600000 %}'
                    - set:
                        name: session.tenantConfig[{{tenantId}}]
                        value: '{{tenantConfig}}'
        - comment: Special-case connect/disconnect tools — central mode only
        - conditions:
            '{{toolName}} == "disconnect"':
              - conditions:
                  '{{authMode}} != "central"':
                    - set:
                        name: response
                        value:
                          jsonrpc: '2.0'
                          id: '{{body.id}}'
                          result:
                            content:
                              - type: text
                                text: The `disconnect` tool is only available in central OAuth mode (without `mcp-api-key`). Tenant PAT mode does not maintain a user session.
                            isError: true
                    - break: {}
              - tool-disconnect:
                  body:
                    arguments: '{{body.params.arguments}}'
                    tenantId: '{{tenantId}}'
                    scope: '{{scope}}'
                    tenantConfig: '{{tenantConfig}}'
                  output: toolResult
              - set:
                  name: response
                  value:
                    jsonrpc: '2.0'
                    id: '{{body.id}}'
                    result: '{{toolResult}}'
              - break: {}
            '{{toolName}} == "connect"':
              - conditions:
                  '{{authMode}} != "central"':
                    - set:
                        name: response
                        value:
                          jsonrpc: '2.0'
                          id: '{{body.id}}'
                          result:
                            content:
                              - type: text
                                text: The `connect` tool is only available in central OAuth mode (without `mcp-api-key`). Tenant PAT mode uses a static Personal Access Token.
                            isError: true
                    - break: {}
              - tool-connect:
                  body:
                    arguments: '{{body.params.arguments}}'
                    tenantId: '{{tenantId}}'
                    scope: '{{scope}}'
                    tenantConfig: '{{tenantConfig}}'
                    authMode: '{{authMode}}'
                  output: toolResult
              - set:
                  name: response
                  value:
                    jsonrpc: '2.0'
                    id: '{{body.id}}'
                    result: '{{toolResult}}'
              - break: {}
        - comment: Resolve auth for this (user, scope)
        - ensureAuthentication:
            tenantId: '{{tenantId}}'
            scope: '{{scope}}'
            authMode: '{{authMode}}'
            tenantConfig: '{{tenantConfig}}'
            output: auth
        - conditions:
            '{{auth.authenticated}}':
              - routeToolCall:
                  toolName: '{{toolName}}'
                  toolArgs:
                    arguments: '{{body.params.arguments}}'
                    accessToken: '{{auth.accessToken}}'
                    baseUrl: '{{auth.baseUrl}}'
                  output: toolResult
              - set:
                  name: response
                  value:
                    jsonrpc: '2.0'
                    id: '{{body.id}}'
                    result: '{{toolResult}}'
              - break: {}
        - comment: Not authenticated — prompt OAuth (central mode only)
        - conditions:
            '{{auth.needsConnect}}':
              - set:
                  name: connectUrl
                  value: '{{global.apiUrl}}/workspaces/slug:<<SERVICE_SLUG>>/webhooks/initiateOAuth'
              - set:
                  name: response
                  value:
                    jsonrpc: '2.0'
                    id: '{{body.id}}'
                    result:
                      content:
                        - type: text
                          text: 'I need to connect to <<SERVICE_NAME>> before I can use this tool. Call the `connect` tool to get a sign-in link, or open this URL in a new tab and retry: {{connectUrl}}'
                      isError: true
              - break: {}
        - comment: No credentials at all — config error
        - set:
            name: response
            value:
              jsonrpc: '2.0'
              id: '{{body.id}}'
              result:
                content:
                  - type: text
                    text: '{% {{auth.message}} || "Authentication failed." %}'
                isError: true
      default:
        - comment: tools/list, initialize, etc. — delegate to MCP Core
        - MCP Core.handleMcpMethod:
            body: '{{body}}'
            serverName: <<SERVICE_SLUG>>-mcp
            serverVersion: 1.0.0
            headers: '{{headers}}'
            output: mcpResult
        - comment: |-
            For tools/list: filter `connect` / `disconnect` when in TENANT mode
            (no OAuth in tenant mode — PAT only). CENTRAL mode keeps them.
        - conditions:
            '{{body.method}} == "tools/list" && {{authMode}} == "tenant"':
              - Custom Code.run:
                  function: filterOAuthTools
                  parameters:
                    tools: '{{mcpResult.response.result.tools}}'
                    remove:
                      - connect
                      - disconnect
                  output: filteredTools
              - conditions:
                  '!{{filteredTools.error}}':
                    - set:
                        name: mcpResult.response.result.tools
                        value: '{{filteredTools}}'
        - set:
            name: response
            value: '{{mcpResult.response}}'
output: '{{response}}'
