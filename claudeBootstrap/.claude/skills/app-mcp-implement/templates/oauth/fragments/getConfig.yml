slug: getConfig
name: 00_MCP/getConfig
description: |-
  Webhook run in the tenant's app instance context. Returns the tenant's <<SERVICE_NAME>> PAT (and baseUrl) to the central MCP endpoint in tenant mode. OAuth is centralised on the service workspace — no per-tenant OAuth fields anymore.
private: true
when:
  endpoint: true
do:
  - comment: 'Guard: unresolved "{{secret.xxx}}" template stays as a literal truthy string when the secret is not set. Wipe it if detected, otherwise the tenant PAT priority in ensureAuthentication would incorrectly short-circuit.'
  - Custom Code.run:
      function: cleanCredential
      parameters:
        value: '{{config.token}}'
      output: cleanAccessToken
  - comment: Fail fast if the tenant has no PAT — central OAuth callers should not use tenant mode.
  - conditions:
      '!{{cleanAccessToken}}':
        - set:
            name: $http
            value:
              status: 400
        - set:
            name: response
            value:
              error: This <<SERVICE_NAME>> tenant has no Personal Access Token configured. Set the workspace secret `<<SERVICE_SLUG>>Token` to enable tenant PAT mode, or omit the `mcp-api-key` header to use central OAuth.
        - break: {}
  - set:
      name: response
      value:
        accessToken: '{{cleanAccessToken}}'
        baseUrl: '{% {{config.baseUrl}} || "<<BASE_URL>>" %}'
output: '{{response}}'
