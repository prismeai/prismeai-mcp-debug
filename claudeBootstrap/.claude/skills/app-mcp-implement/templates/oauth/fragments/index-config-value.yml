# Fragment to MERGE into index.yml > config.value of the central workspace.
#
# Plumbs the centralised OAuth client + provider URLs from the workspace
# secrets into runtime. Tenants do NOT see or set these — they're shared
# by all callers of /apps/<<SERVICE_SLUG>> in central mode.
#
# {{secret.X}} only resolves inside config.value of the workspace that
# owns the secret (the service workspace), not inside an app instance config.

oauthClientId: '{{secret.<<SERVICE_SLUG>>OauthClientId}}'
oauthClientSecret: '{{secret.<<SERVICE_SLUG>>OauthClientSecret}}'
authorizationUrl: <<PROVIDER_AUTHORIZE_URL>>
tokenUrl: <<PROVIDER_TOKEN_URL>>
revocationUrl: <<PROVIDER_REVOKE_URL>>
scopes: api
refreshTokenTtl: 7200
