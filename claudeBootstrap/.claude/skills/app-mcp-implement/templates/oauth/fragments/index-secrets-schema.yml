# Fragment to MERGE into index.yml > secrets.schema of the central workspace.
#
# Required for OAuth central mode: these two secrets hold THE ONE OAuth
# Application registered with the provider, shared by every Prisme.ai user
# who calls /apps/<<SERVICE_SLUG>> without an `mcp-api-key` header.
#
# Workspace admin fills these via Builder UI > Secrets after scaffold.
# A single OAuth callback URL is registered on the provider:
#   <api-url>/workspaces/slug:<<SERVICE_SLUG>>/webhooks/oauthCallback

<<SERVICE_SLUG>>OauthClientId:
  type: string
  title: <<SERVICE_NAME>> OAuth Client ID
  description: 'Client ID of the central <<SERVICE_NAME>> OAuth Application shared by all Prisme.ai users. Create the OAuth app at <<PROVIDER_APP_URL>> and paste its Application ID here.'
  ui:widget: password

<<SERVICE_SLUG>>OauthClientSecret:
  type: string
  title: <<SERVICE_NAME>> OAuth Client Secret
  description: 'Client Secret matching <<SERVICE_SLUG>>OauthClientId (shown once on the OAuth Application page at <<PROVIDER_APP_URL>>).'
  ui:widget: password
