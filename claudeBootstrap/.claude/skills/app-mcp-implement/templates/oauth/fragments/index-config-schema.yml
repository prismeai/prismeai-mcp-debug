# DEPRECATED — OAuth centralisé.
#
# Avec le nouveau modèle, les credentials OAuth (clientId/Secret/urls/scopes)
# vivent dans les SECRETS du workspace de service (cf. index-secrets-schema.yml)
# et sont câblés via index-config-value.yml. Ils ne sont PLUS exposés dans
# config.schema de l'App publiée : il n'y a plus rien à templater ici.
#
# Le `.import.yml` config.schema n'a donc QUE :
#   - baseUrl (déjà dans templates/index.yml)
#   - token (PAT statique, déjà dans templates/index.yml)
#   - mcpEndpoint, mcpApiKey (readOnly, déjà dans templates/index.yml)
#
# Ce fichier est conservé pour signaler explicitement le changement aux runs
# antérieurs qui auraient mergé l'ancien contenu. À supprimer du scaffold
# Phase 4.5 dans une prochaine itération.
