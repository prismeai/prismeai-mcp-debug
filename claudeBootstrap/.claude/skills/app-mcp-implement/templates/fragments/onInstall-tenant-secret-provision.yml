# <<TENANT_SECRET_PROVISION_HOOK>> fragment — Phase 4 step 11
#
# Insert this block into `automations/onInstall.yml` at the
# <<TENANT_SECRET_PROVISION_HOOK>> marker, BEFORE the `completed` emit + the
# terminal `set: config type: merge`. Repeat the `!existingSecrets.<KEY>`
# block once per tenant credential listed in `secrets.schema`.
#
# Replace these placeholders:
#   <<SECRET_KEY>>     → the key in `secrets.schema` (e.g. googleSearchApiKey)
#   <<CONFIG_KEY>>     → the corresponding key in `config.schema` (e.g. apiKey)
#   <<DESCRIPTION>>    → user-facing description that helps the admin obtain
#                        the value (URLs to vendor console, scopes, etc.).
#   <<SERVICE_SLUG>>   → camelCase service slug (for the emit event)
#
# After this block, ALSO add the corresponding `<<CONFIG_KEY>>: '{{binding<<KEY>>}}'`
# entries to the terminal `set: config type: merge` (see <<TENANT_SECRET_BINDING_A>>
# marker in onInstall.yml).
#
# OAuth (Phase 4.5) extends this same block with `<<SERVICE_SLUG>>OauthClientId`
# and `<<SERVICE_SLUG>>OauthClientSecret`. No additional infrastructure needed.

  - auth:
      workspace: true
      output: wsJwt
  - set:
      name: secretsUrl
      value: '{{global.apiUrl}}/workspaces/{{global.workspaceId}}/security/secrets'
  - fetch:
      url: '{{secretsUrl}}'
      method: GET
      headers:
        Authorization: Bearer {{wsJwt.jwt}}
      output: existingSecretsResp
      outputMode: detailed_response
      emitErrors: false
  - set:
      name: existingSecrets
      value: '{{existingSecretsResp.body}}'
  - set:
      name: toProvision
      value: {}
  - set:
      name: provisionCount
      value: 0
  # ---- Repeat for each tenant credential in secrets.schema ----
  - conditions:
      '!{{existingSecrets.<<SECRET_KEY>>}}':
        - set:
            name: toProvision.<<SECRET_KEY>>
            value:
              value: ''
              description: '<<DESCRIPTION>>'
        - set:
            name: provisionCount
            value: '{% {{provisionCount}} + 1 %}'
  # ---- End repeat ----
  - conditions:
      '{{provisionCount}} > 0':
        - fetch:
            url: '{{secretsUrl}}'
            method: PATCH
            headers:
              Authorization: Bearer {{wsJwt.jwt}}
              Content-Type: application/json
            body: '{{toProvision}}'
            output: provisionResp
            outputMode: detailed_response
            emitErrors: false
        - emit:
            event: <<SERVICE_SLUG>>.onInstall.secretsProvisioned
            payload:
              status: '{{provisionResp.status}}'
              provisioned: '{{toProvision}}'
  # ---- Repeat makeSecretRef per credential ----
  - Custom Code.run:
      function: makeSecretRef
      parameters:
        key: <<SECRET_KEY>>
      output: secretRef<<SecretKeyPascal>>
  # ---- End repeat ----
  - set:
      name: configUrl
      value: '{{global.apiUrl}}/workspaces/{{global.workspaceId}}/config'
  - fetch:
      url: '{{configUrl}}'
      method: GET
      headers:
        Authorization: Bearer {{wsJwt.jwt}}
      output: curWsConfig
      outputMode: body
      emitErrors: false
  - set:
      name: newWsValue
      value: '{{curWsConfig.value}}'
  # ---- Repeat per credential — write binding B ----
  - set:
      name: newWsValue.<<SECRET_KEY>>
      value: '{{secretRef<<SecretKeyPascal>>}}'
  # ---- End repeat ----
  - fetch:
      url: '{{configUrl}}'
      method: PATCH
      headers:
        Authorization: Bearer {{wsJwt.jwt}}
        Content-Type: application/json
      body:
        value: '{{newWsValue}}'
      output: wsConfigResp
      outputMode: detailed_response
      emitErrors: false
  - emit:
      event: <<SERVICE_SLUG>>.onInstall.bindingBWritten
      payload:
        status: '{{wsConfigResp.status}}'
  # ---- Repeat makeConfigRef per credential — used in binding A merge ----
  - Custom Code.run:
      function: makeConfigRef
      parameters:
        key: <<SECRET_KEY>>
      output: binding<<SecretKeyPascal>>
  # ---- End repeat ----
